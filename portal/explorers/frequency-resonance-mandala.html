<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Frequency Resonance Mandala · Session 5</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0B0B0B; --terra: #C4622D; --gold: #C48C50; --luna: #FDFBE2;
            --rock: 'Inter', monospace; --ocean: 'Playfair Display', serif;
        }
        body { margin: 0; background: var(--void); color: var(--luna); font-family: var(--ocean); overflow: hidden; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; }
        .nav { position: fixed; top: 20px; left: 20px; font-family: var(--rock); font-size: 0.8rem; letter-spacing: 0.2em; text-transform: uppercase; }
        .nav a { color: var(--terra); text-decoration: none; transition: color 0.3s; }
        .nav a:hover { color: var(--gold); }
        .cycler-btn { background: var(--void); border: 1px solid rgba(196,140,80,0.4); color: var(--gold); font-family: var(--rock); font-size: 0.75rem; padding: 12px 24px; cursor: pointer; letter-spacing: 0.15em; transition: all 0.2s; position: absolute; bottom: 10vh; z-index: 10; }
        .cycler-btn:hover { background: rgba(196,98,45,0.2); color: var(--luna); border-color: var(--terra); }
        #freq-display { position: absolute; bottom: 17vh; z-index: 10; font-family: var(--rock); font-size: 0.65rem; letter-spacing: 0.2em; color: var(--ink, #8A7D71); text-align: center; min-height: 2em; transition: color 0.3s; }
        #math-note { position: absolute; bottom: 6.5vh; z-index: 10; font-family: var(--rock); font-size: 0.55rem; letter-spacing: 0.25em; color: rgba(196,140,80,0.35); text-align: center; max-width: 520px; line-height: 1.8; }
        #lock-label { position: absolute; top: 10vh; right: 8vw; font-family: var(--rock); font-size: 0.65rem; letter-spacing: 0.25em; color: var(--terra); opacity: 0; transition: opacity 1.5s; text-transform: uppercase; text-align: right; line-height: 1.8; z-index: 10; }
    </style>
</head>
<body>
    <div class="nav"><a href="index.html">← RETURN TO EXPLORERS</a></div>

    <div style="position: absolute; width: 100%; text-align: center; top: 10vh; z-index: 10;">
      <h3 style="font-family: var(--rock); font-size: clamp(1.2rem, 2vw, 1.6rem); color: var(--terra); letter-spacing: 0.1em; font-weight: 600;">SESSION 5 :: THE FREQUENCY RESONANCE MANDALA</h3>
      <div style="font-family: var(--rock); font-size: 0.8rem; color: var(--gold); letter-spacing: 0.2em; text-transform: uppercase; margin-top: 8px;">[ Face 5 · Imagination ]</div>
    </div>

    <div id="lock-label">YOUR RESONANCE<br>GEOMETRY</div>

    <div id="mandala-container" style="position: relative; width: 400px; height: 400px; display: flex; align-items: center; justify-content: center;">
      <!-- 12 Sacred Wireframes -->
      <svg width="400" height="400" viewBox="0 0 400 400" style="position: absolute; opacity: 0.15;">
        <g stroke="var(--terra)" stroke-width="1" fill="none">
          <circle cx="200" cy="200" r="180"/>
          <!-- 12-fold division lines -->
          <line x1="200" y1="20" x2="200" y2="380"/>
          <line x1="20" y1="200" x2="380" y2="200"/>
          <line x1="73" y1="73" x2="327" y2="327"/>
          <line x1="73" y1="327" x2="327" y2="73"/>
          <line x1="134" y1="26" x2="266" y2="374"/>
          <line x1="26" y1="134" x2="374" y2="266"/>
          <line x1="134" y1="374" x2="266" y2="26"/>
          <line x1="26" y1="266" x2="374" y2="134"/>
          <!-- Inner guide circles -->
          <circle cx="200" cy="200" r="80" stroke-dasharray="3 6" opacity="0.4"/>
          <circle cx="200" cy="200" r="120" stroke-dasharray="2 8" opacity="0.25"/>
        </g>
      </svg>
      <canvas id="mandala-canvas" width="400" height="400" style="position: absolute; z-index: 2; border-radius: 50%; opacity: 0.95;"></canvas>

      <div id="mandala-ui" style="position: relative; z-index: 3; text-align: center; pointer-events: none; transition: opacity 0.8s;">
        <h2 style="font-family: var(--ocean); font-size: clamp(2.5rem, 4vw, 3.5rem); color: var(--luna); font-style: italic; font-weight: 400; margin: 0; text-shadow: 0 4px 20px rgba(0,0,0,0.8);">
          Who do I think I am?
        </h2>
        <div style="font-family: var(--rock); font-size: 0.75rem; color: var(--gold); letter-spacing: 0.25em; text-transform: uppercase; margin-top: 2rem; opacity: 0.7;">
          Your answer opens the steep.
        </div>
      </div>
    </div>

    <div id="freq-display"></div>
    <button id="mic-trigger" class="cycler-btn">[ INITIATE RESONANCE · ENGAGE MIC ]</button>
    <div id="math-note">12-fold symmetry &nbsp;·&nbsp; Your voice geometrized &nbsp;·&nbsp; The mandala mirrors what you carry</div>

<script>
  const micBtn = document.getElementById('mic-trigger');
  const mandalaCanvas = document.getElementById('mandala-canvas');
  const mandalaCtx = mandalaCanvas.getContext('2d');
  const freqDisplay = document.getElementById('freq-display');
  const lockLabel = document.getElementById('lock-label');
  let analyzerCtx = null, analyser = null, dataArray = null;
  let isTraceLocked = false;
  let animFrame = null;

  // Frequency bin → Hz conversion helpers
  // With fftSize=256 and typical sampleRate=44100: bin width ≈ 172 Hz
  // Voice range roughly 80–3000 Hz; we map into that slice of dataArray
  // BODY / HEART / MIND color bands:
  //   BODY  (bass)  < 250 Hz  → terra  #C4622D
  //   HEART (mid)   250–800 Hz → gold   #C48C50
  //   MIND  (high)  > 800 Hz  → luna   #FDFBE2

  function getBandColor(hz) {
    if (hz < 250) return { color: 'rgba(196,98,45,', label: 'BODY' };
    if (hz < 800) return { color: 'rgba(196,140,80,', label: 'HEART' };
    return { color: 'rgba(253,251,226,', label: 'MIND' };
  }

  micBtn.addEventListener('click', async () => {
    if (isTraceLocked) return;
    try {
      if (!analyzerCtx) analyzerCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (analyzerCtx.state === 'suspended') analyzerCtx.resume();

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = analyzerCtx.createMediaStreamSource(stream);
      analyser = analyzerCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.75;
      source.connect(analyser);

      dataArray = new Uint8Array(analyser.frequencyBinCount); // 128 bins

      micBtn.textContent = '[ RESONANCE DETECTED · DRAWING TRACE ]';
      micBtn.style.color = 'var(--gold)';
      micBtn.style.borderColor = 'var(--gold)';
      document.getElementById('mandala-ui').style.opacity = '0.08';

      drawMandala();

      setTimeout(() => {
        stream.getTracks().forEach(t => t.stop());
        isTraceLocked = true;
        if (animFrame) cancelAnimationFrame(animFrame);

        micBtn.textContent = '[ TRACE LOCKED ]';
        micBtn.style.color = 'var(--terra)';
        micBtn.style.borderColor = 'var(--terra)';
        micBtn.style.pointerEvents = 'none';
        freqDisplay.textContent = '';
        lockLabel.style.opacity = '1';
      }, 7000);

    } catch (err) {
      micBtn.textContent = '[ MIC ACCESS DENIED ]';
    }
  });

  function drawMandala() {
    if (isTraceLocked) return;
    animFrame = requestAnimationFrame(drawMandala);
    analyser.getByteFrequencyData(dataArray);

    const sampleRate = analyzerCtx.sampleRate;
    const binHz = sampleRate / analyser.fftSize; // Hz per bin

    // Accumulation: fade very slowly so geometry builds up
    mandalaCtx.fillStyle = 'rgba(11,11,11,0.025)';
    mandalaCtx.fillRect(0, 0, 400, 400);

    const cx = 200, cy = 200;
    const baseRad = 80;
    const PETALS = 12;
    const POINTS_PER_PETAL = 32; // points per 30° segment
    const segAngle = (2 * Math.PI) / PETALS;

    // Map voice frequencies: 80 Hz–3200 Hz across POINTS_PER_PETAL points
    const voiceMinHz = 80;
    const voiceMaxHz = 3200;
    const voiceMinBin = Math.floor(voiceMinHz / binHz);
    const voiceMaxBin = Math.min(Math.floor(voiceMaxHz / binHz), dataArray.length - 1);
    const voiceBins = voiceMaxBin - voiceMinBin;

    // Track dominant band for display
    let bodySum = 0, heartSum = 0, mindSum = 0;
    let bodyCount = 0, heartCount = 0, mindCount = 0;

    mandalaCtx.beginPath();

    for (let petal = 0; petal < PETALS; petal++) {
      const petalBaseAngle = petal * segAngle - Math.PI / 2;

      for (let p = 0; p <= POINTS_PER_PETAL; p++) {
        // Bilateral symmetry within each petal: mirror at midpoint
        const mirrorP = p <= POINTS_PER_PETAL / 2 ? p : POINTS_PER_PETAL - p;
        const t = mirrorP / (POINTS_PER_PETAL / 2); // 0..1

        // Map t to a voice-range frequency bin
        const binIdx = voiceMinBin + Math.floor(t * voiceBins);
        const clampedBin = Math.min(Math.max(binIdx, 0), dataArray.length - 1);
        const val = dataArray[clampedBin];

        const hz = clampedBin * binHz;
        const { color } = getBandColor(hz);

        if (hz < 250) { bodySum += val; bodyCount++; }
        else if (hz < 800) { heartSum += val; heartCount++; }
        else { mindSum += val; mindCount++; }

        const r = baseRad + val * 0.45;
        const angle = petalBaseAngle + (p / POINTS_PER_PETAL) * segAngle;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;

        // Each petal segment gets its own stroke color by band
        if (p === 0 && petal === 0) mandalaCtx.moveTo(x, y);
        else mandalaCtx.lineTo(x, y);
      }
    }
    mandalaCtx.closePath();

    // Determine dominant band for stroke color
    const bodyAvg = bodyCount > 0 ? bodySum / bodyCount : 0;
    const heartAvg = heartCount > 0 ? heartSum / heartCount : 0;
    const mindAvg = mindCount > 0 ? mindSum / mindCount : 0;

    let dominantColor, dominantLabel, dominantHz;
    if (bodyAvg >= heartAvg && bodyAvg >= mindAvg) {
      dominantColor = 'rgba(196,98,45,0.7)';
      dominantLabel = 'BODY';
      dominantHz = Math.round(voiceMinHz + (voiceMinHz + 250) / 2);
    } else if (heartAvg >= mindAvg) {
      dominantColor = 'rgba(196,140,80,0.7)';
      dominantLabel = 'HEART';
      dominantHz = 440;
    } else {
      dominantColor = 'rgba(253,251,226,0.5)';
      dominantLabel = 'MIND';
      dominantHz = 1200;
    }

    mandalaCtx.strokeStyle = dominantColor;
    mandalaCtx.lineWidth = 1.2;
    mandalaCtx.stroke();

    // Also draw each petal's color individually as thin overlay
    for (let petal = 0; petal < PETALS; petal++) {
      const petalBaseAngle = petal * segAngle - Math.PI / 2;
      mandalaCtx.beginPath();
      for (let p = 0; p <= POINTS_PER_PETAL; p++) {
        const mirrorP = p <= POINTS_PER_PETAL / 2 ? p : POINTS_PER_PETAL - p;
        const t = mirrorP / (POINTS_PER_PETAL / 2);
        const binIdx = voiceMinBin + Math.floor(t * voiceBins);
        const clampedBin = Math.min(Math.max(binIdx, 0), dataArray.length - 1);
        const val = dataArray[clampedBin];
        const hz = clampedBin * binHz;
        const { color } = getBandColor(hz);
        const r = baseRad + val * 0.45;
        const angle = petalBaseAngle + (p / POINTS_PER_PETAL) * segAngle;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (p === 0) mandalaCtx.moveTo(x, y);
        else mandalaCtx.lineTo(x, y);

        // Color per point: small dot marker at high-energy moments
        if (val > 180) {
          mandalaCtx.fillStyle = color + '0.6)';
          mandalaCtx.fillRect(x - 0.5, y - 0.5, 1.5, 1.5);
        }
      }
      mandalaCtx.strokeStyle = dominantColor;
      mandalaCtx.lineWidth = 0.5;
      mandalaCtx.stroke();
    }

    // Update frequency display
    const overallEnergy = (bodyAvg + heartAvg + mindAvg) / 3;
    if (overallEnergy > 5) {
      freqDisplay.textContent = dominantLabel + ' · ' + Math.round(overallEnergy) + ' · ' + dominantLabel;
      if (dominantLabel === 'BODY') freqDisplay.style.color = '#C4622D';
      else if (dominantLabel === 'HEART') freqDisplay.style.color = '#C48C50';
      else freqDisplay.style.color = '#FDFBE2';
    } else {
      freqDisplay.textContent = '· · ·';
      freqDisplay.style.color = 'rgba(138,125,113,0.5)';
    }
  }
</script>
</body>
</html>
