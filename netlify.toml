[build]
  publish = "HDM_API/portal"
  # No build command — pure static site

[[redirects]]
  from = "/"
  to = "/portal/index.html"
  status = 301
  force = true

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"

[[headers]]
  for = "/explorers/*"
  [headers.values]
    Cache-Control = "public, max-age=3600, must-revalidate"
