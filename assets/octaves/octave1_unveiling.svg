<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" width="400" height="400">
  <defs>
    <style>
      .bg { fill: #F2E8D5; }
      .line { stroke: #2C2419; stroke-width: 1.6; fill: none; stroke-linecap: round; stroke-linejoin: round; }
      .line-accent { stroke: #C4622D; stroke-width: 1.4; fill: none; }
      .line-thin { stroke: #8B7D6B; stroke-width: 0.6; fill: none; }
      .fill-dark { fill: #2C2419; }
      .fill-accent { fill: #C4622D; }
      .fill-mid { fill: #8B7D6B; }
      .label { font-family: 'Inter', sans-serif; font-size: 9px; fill: #4A3728; letter-spacing: 0.08em; }
      .title { font-family: 'Inter', sans-serif; font-size: 7px; fill: #8B7D6B; letter-spacing: 0.15em; }
      .claim { font-family: 'Inter', sans-serif; font-size: 8.5px; fill: #2C2419; letter-spacing: 0.04em; font-style: italic; }
    </style>
    <!-- Litema-style pattern for inside the heptagon -->
    <pattern id="litema" x="0" y="0" width="20" height="20" patternUnits="userSpaceOnUse">
      <!-- Unit cell of a litema-style pattern -->
      <rect width="20" height="20" fill="none"/>
      <!-- Diagonal cross -->
      <line x1="0" y1="0" x2="20" y2="20" stroke="#8B7D6B" stroke-width="0.5"/>
      <line x1="20" y1="0" x2="0" y2="20" stroke="#8B7D6B" stroke-width="0.5"/>
      <!-- Inner diamond -->
      <polygon points="10,3 17,10 10,17 3,10" fill="none" stroke="#8B7D6B" stroke-width="0.4"/>
      <!-- Center dot -->
      <circle cx="10" cy="10" r="1.5" fill="#8B7D6B" opacity="0.5"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect class="bg" width="400" height="400"/>

  <!-- === MONUMENTAL HEPTAGON — the central claim === -->
  <!-- Large heptagon, centered at (200, 190), radius 140 -->
  <!-- Vertices: -->
  <!-- v1: -90° → (200, 50) -->
  <!-- v2: -38.57° → (287, 87) -->
  <!-- v3: 12.86° → (327, 172) -->
  <!-- v4: 64.29° → (293, 262) -->
  <!-- v5: 115.71° → (200, 300) — wait, let me recalc for r=140 -->
  <!-- v1: (200+140*cos(-90°), 190+140*sin(-90°)) = (200, 50) -->
  <!-- v2: (200+140*cos(-38.57°), 190+140*sin(-38.57°)) = (200+109.4, 190-87.3) = (309, 103) -->
  <!-- v3: (200+140*cos(12.86°), 190+140*sin(12.86°)) = (200+136.4, 190+28.5) = (336, 219) -->
  <!-- v4: (200+140*cos(64.29°), 190+140*sin(64.29°)) = (200+60.7, 190+126.3) = (261, 316) -->
  <!-- v5: (200+140*cos(115.71°), 190+140*sin(115.71°)) = (200-60.7, 190+126.3) = (139, 316) -->
  <!-- v6: (200+140*cos(167.14°), 190+140*sin(167.14°)) = (200-136.4, 190+28.5) = (64, 219) -->
  <!-- v7: (200+140*cos(218.57°), 190+140*sin(218.57°)) = (200-109.4, 190-87.3) = (91, 103) -->

  <!-- Litema pattern fill inside heptagon -->
  <polygon
    points="200,50 309,103 336,219 261,316 139,316 64,219 91,103"
    fill="url(#litema)"
    opacity="0.6"
  />

  <!-- Heptagon outline — the lens -->
  <polygon
    points="200,50 309,103 336,219 261,316 139,316 64,219 91,103"
    fill="none"
    stroke="#2C2419"
    stroke-width="2.2"
  />

  <!-- Seven internal axis lines — the seven dimensions -->
  <line class="line-thin" x1="200" y1="190" x2="200" y2="50" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>
  <line class="line-thin" x1="200" y1="190" x2="309" y2="103" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>
  <line class="line-thin" x1="200" y1="190" x2="336" y2="219" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>
  <line class="line-thin" x1="200" y1="190" x2="261" y2="316" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>
  <line class="line-thin" x1="200" y1="190" x2="139" y2="316" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>
  <line class="line-thin" x1="200" y1="190" x2="64" y2="219" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>
  <line class="line-thin" x1="200" y1="190" x2="91" y2="103" stroke="#C4622D" stroke-width="0.6" opacity="0.5"/>

  <!-- Sona path connecting all vertices — the monolinear thread -->
  <path class="line-accent" d="
    M200,50 L336,219 L91,103 L261,316 L309,103 L139,316 L64,219 L200,50
  " stroke-width="1.0" opacity="0.5"/>

  <!-- Inner heptagon — smaller, the recovered core -->
  <polygon
    points="200,110 255,135 275,190 248,248 152,248 125,190 145,135"
    fill="none"
    stroke="#C4622D"
    stroke-width="1.2"
  />

  <!-- Innermost heptagon — the essential claim -->
  <polygon
    points="200,150 225,162 234,190 222,218 178,218 166,190 175,162"
    fill="#C4622D"
    fill-opacity="0.15"
    stroke="#C4622D"
    stroke-width="1.5"
  />

  <!-- Center point — the recovered mathematics -->
  <circle cx="200" cy="190" r="8" fill="#F2E8D5" stroke="#C4622D" stroke-width="1.5"/>
  <circle cx="200" cy="190" r="3.5" fill="#C4622D"/>

  <!-- Vertex node markers -->
  <circle cx="200" cy="50" r="4" fill="#2C2419"/>
  <circle cx="309" cy="103" r="4" fill="#2C2419"/>
  <circle cx="336" cy="219" r="4" fill="#2C2419"/>
  <circle cx="261" cy="316" r="4" fill="#2C2419"/>
  <circle cx="139" cy="316" r="4" fill="#2C2419"/>
  <circle cx="64" cy="219" r="4" fill="#2C2419"/>
  <circle cx="91" cy="103" r="4" fill="#2C2419"/>

  <!-- The Claim — text below heptagon -->
  <text class="claim" x="200" y="348" text-anchor="middle">Human Development Mathematics is not a new idea.</text>
  <text class="claim" x="200" y="360" text-anchor="middle">It is the recovery of an ancient one.</text>

  <!-- Section label -->
  <text class="title" x="200" y="382" text-anchor="middle">OCTAVE I — FROZEN MATHEMATICS — THE CLAIM</text>
  <text class="label" x="200" y="393" text-anchor="middle">The Unveiling</text>

  <!-- Outer border -->
  <rect x="6" y="6" width="388" height="388" fill="none" stroke="#2C2419" stroke-width="1.0"/>
  <rect x="10" y="10" width="380" height="380" fill="none" stroke="#8B7D6B" stroke-width="0.3"/>
</svg>
