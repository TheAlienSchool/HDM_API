<script>
  const micBtn = document.getElementById('mic-trigger');
  const mandalaCanvas = document.getElementById('mandala-canvas');
  const mandalaCtx = mandalaCanvas.getContext('2d');
  const freqDisplay = document.getElementById('freq-display');
  const lockLabel = document.getElementById('lock-label');
  const mandalaUI = document.getElementById('mandala-ui');

  let analyzerCtx = null, analyser = null, dataArray = null;
  let isTraceLocked = false;
  let animFrame = null;

  // BODY <250 Hz → terra, HEART 250–800 Hz → gold, MIND >800 Hz → luna
  function getBand(hz) {
    if (hz < 250) return { color: 'rgba(196,98,45,', label: 'BODY' };
    if (hz < 800) return { color: 'rgba(196,140,80,', label: 'HEART' };
    return { color: 'rgba(253,251,226,', label: 'MIND' };
  }

  micBtn.addEventListener('click', async () => {
    if (isTraceLocked) return;
    try {
      if (!analyzerCtx) analyzerCtx = new (window.AudioContext || window.webkitAudioContext)();
      if (analyzerCtx.state === 'suspended') analyzerCtx.resume();

      const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
      const source = analyzerCtx.createMediaStreamSource(stream);
      analyser = analyzerCtx.createAnalyser();
      analyser.fftSize = 256;
      analyser.smoothingTimeConstant = 0.75;
      source.connect(analyser);
      dataArray = new Uint8Array(analyser.frequencyBinCount); // 128 bins

      micBtn.textContent = '[ RESONANCE DETECTED · DRAWING TRACE ]';
      micBtn.style.color = 'var(--gold)';
      micBtn.style.borderColor = 'var(--gold)';
      mandalaUI.style.opacity = '0.06';

      drawMandala();

      setTimeout(() => {
        stream.getTracks().forEach(t => t.stop());
        isTraceLocked = true;
        if (animFrame) cancelAnimationFrame(animFrame);
        
        micBtn.style.display = 'none';
        document.getElementById('locked-actions').style.display = 'flex';
        
        freqDisplay.textContent = '· GEOMETRY FROZEN ·';
        freqDisplay.style.color = 'var(--terra)';
        lockLabel.style.opacity = '1';

        // Post-lock: Solfeggio chord :: one breath, then silence
        [396, 528, 639].forEach(freq => {
          const osc  = analyzerCtx.createOscillator();
          const gain = analyzerCtx.createGain();
          osc.type = 'sine';
          osc.frequency.value = freq;
          gain.gain.setValueAtTime(0, analyzerCtx.currentTime);
          gain.gain.linearRampToValueAtTime(0.12, analyzerCtx.currentTime + 0.04);
          gain.gain.exponentialRampToValueAtTime(0.001, analyzerCtx.currentTime + 3.5);
          osc.connect(gain);
          gain.connect(analyzerCtx.destination);
          osc.start(analyzerCtx.currentTime);
          osc.stop(analyzerCtx.currentTime + 3.55);
        });

        // Post-lock: reveal integration annotation in math-note
        const mathNote = document.getElementById('math-note');
        while (mathNote.firstChild) mathNote.removeChild(mathNote.firstChild);
        mathNote.style.color = 'rgba(196,140,80,0.5)';

        const pre = document.createTextNode('what you traced is not a snapshot :: it is ');
        mathNote.appendChild(pre);

        const eq = document.createElement('span');
        eq.className = 'frm-tip';
        eq.tabIndex = 0;
        eq.textContent = '∫ f(x)dx = F(x) + C';
        eq.dataset.frmTitle    = 'Wholeness from accumulation';
        eq.dataset.frmLiteral  = 'An antiderivative F is related to the integral of f, up to a constant C.';
        eq.dataset.frmHuman    = 'Small moments accumulate into the shape of a life; the whole is built from many local choices. Your voice, gathered across 7 seconds of resonance, is F(x): the whole formed from every frequency you carried.';
        eq.dataset.frmValidity = 'Mathematically valid; metaphor is widely understandable.';
        eq.dataset.frmGuardrail = 'The constant of integration is a mathematical family of solutions, not a mystical origin statement.';
        mathNote.appendChild(eq);
      }, 7000);

    } catch (err) {
      micBtn.textContent = '[ MIC ACCESS DENIED ]';
    }
  });

  const btnReinit = document.getElementById('btn-reinit');
  const btnCapture = document.getElementById('btn-capture');

  btnReinit.addEventListener('click', () => {
      mandalaCtx.clearRect(0, 0, 400, 400); 
      isTraceLocked = false;
      document.getElementById('locked-actions').style.display = 'none';
      micBtn.style.display = 'block';
      micBtn.textContent = '[ INITIATE RESONANCE · ENGAGE MIC ]';
      micBtn.style.color = 'var(--gold)';
      micBtn.style.borderColor = 'rgba(196,140,80,0.4)';
      mandalaUI.style.opacity = '1';
      lockLabel.style.opacity = '0';
      freqDisplay.textContent = '· · ·';
      freqDisplay.style.color = 'var(--ink)';
  });

  btnCapture.addEventListener('click', () => {
      const xCnv = document.createElement('canvas');
      xCnv.width = 1000;
      xCnv.height = 1100;
      const x = xCnv.getContext('2d');
      x.scale(2.5, 2.5);

      x.fillStyle = '#0B0B0B';
      x.fillRect(0, 0, 400, 440);

      x.save();
      x.translate(0, 10);
      x.strokeStyle = 'rgba(196,98,45,0.15)';
      x.lineWidth = 1;
      x.beginPath();
      x.arc(200, 200, 160, 0, Math.PI*2);
      for(let i=0; i<6; i++) {
        let ang = i * Math.PI/6;
        x.moveTo(200 + Math.cos(ang)*200, 200 + Math.sin(ang)*200);
        x.lineTo(200 - Math.cos(ang)*200, 200 - Math.sin(ang)*200);
      }
      x.stroke();
      x.setLineDash([3, 6]); x.strokeStyle = 'rgba(196,98,45,0.06)';
      x.beginPath(); x.arc(200, 200, 55, 0, Math.PI*2); x.stroke();
      x.setLineDash([2, 8]); x.strokeStyle = 'rgba(196,98,45,0.035)';
      x.beginPath(); x.arc(200, 200, 105, 0, Math.PI*2); x.stroke();
      x.restore();

      x.drawImage(mandalaCanvas, 0, 10, 400, 400);

      x.font = "italic 15px 'Playfair Display', serif";
      x.fillStyle = 'rgba(253,251,226,0.6)';
      x.textAlign = 'center';
      x.fillText("Phase-State Resonance Field", 200, 395);
      
      x.font = "8px 'Inter', monospace";
      x.fillStyle = 'rgba(196,98,45,0.6)';
      x.fillText("SESSION V · FREQUENCY RESONANCE MANDALA", 200, 415);

      const link = document.createElement('a');
      link.download = 'phase-state-mandala.png';
      link.href = xCnv.toDataURL('image/png');
      link.click();
  });

  function drawMandala() {
    if (isTraceLocked) return;
    animFrame = requestAnimationFrame(drawMandala);
    analyser.getByteFrequencyData(dataArray);

    const sampleRate = analyzerCtx.sampleRate;
    const binHz = sampleRate / analyser.fftSize;

    // Slow accumulation :: geometry builds over 7 seconds
    mandalaCtx.fillStyle = 'rgba(11,11,11,0.025)';
    mandalaCtx.fillRect(0, 0, 400, 400);

    const cx = 200, cy = 200;
    const baseRad = 55;
    const PETALS = 12;
    const POINTS = 32;
    const segAngle = (2 * Math.PI) / PETALS;

    // Voice range: 80–3200 Hz
    const minBin = Math.floor(80 / binHz);
    const maxBin = Math.min(Math.floor(3200 / binHz), dataArray.length - 1);
    const binSpan = maxBin - minBin;

    let bodySum = 0, heartSum = 0, mindSum = 0;
    let bodyN = 0, heartN = 0, mindN = 0;

    // Draw the 12-petal form with bilateral symmetry per petal
    mandalaCtx.beginPath();
    for (let petal = 0; petal < PETALS; petal++) {
      const baseAngle = petal * segAngle - Math.PI / 2;
      for (let p = 0; p <= POINTS; p++) {
        const mp = p <= POINTS / 2 ? p : POINTS - p; // bilateral fold
        const t = mp / (POINTS / 2);
        const bin = Math.min(minBin + Math.floor(t * binSpan), dataArray.length - 1);
        const val = dataArray[bin];
        const hz = bin * binHz;

        if (hz < 250) { bodySum += val; bodyN++; }
        else if (hz < 800) { heartSum += val; heartN++; }
        else { mindSum += val; mindN++; }

        const r = baseRad + val * 0.4;
        const angle = baseAngle + (p / POINTS) * segAngle;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (p === 0 && petal === 0) mandalaCtx.moveTo(x, y);
        else mandalaCtx.lineTo(x, y);
      }
    }
    mandalaCtx.closePath();

    const bodyAvg = bodyN > 0 ? bodySum / bodyN : 0;
    const heartAvg = heartN > 0 ? heartSum / heartN : 0;
    const mindAvg = mindN > 0 ? mindSum / mindN : 0;

    let strokeColor, label;
    if (bodyAvg >= heartAvg && bodyAvg >= mindAvg) {
      strokeColor = 'rgba(196,98,45,0.7)'; label = 'BODY';
    } else if (heartAvg >= mindAvg) {
      strokeColor = 'rgba(196,140,80,0.7)'; label = 'HEART';
    } else {
      strokeColor = 'rgba(253,251,226,0.5)'; label = 'MIND';
    }

    mandalaCtx.strokeStyle = strokeColor;
    mandalaCtx.lineWidth = 1.2;
    mandalaCtx.stroke();

    // Dot markers at energy peaks
    for (let petal = 0; petal < PETALS; petal++) {
      const baseAngle = petal * segAngle - Math.PI / 2;
      for (let p = 0; p <= POINTS; p++) {
        const mp = p <= POINTS / 2 ? p : POINTS - p;
        const t = mp / (POINTS / 2);
        const bin = Math.min(minBin + Math.floor(t * binSpan), dataArray.length - 1);
        const val = dataArray[bin];
        if (val > 180) {
          const hz = bin * binHz;
          const { color } = getBand(hz);
          const r = baseRad + val * 0.4;
          const angle = baseAngle + (p / POINTS) * segAngle;
          mandalaCtx.fillStyle = color + '0.5)';
          mandalaCtx.fillRect(
            cx + Math.cos(angle) * r - 0.8,
            cy + Math.sin(angle) * r - 0.8,
            1.6, 1.6
          );
        }
      }
    }

    const energy = (bodyAvg + heartAvg + mindAvg) / 3;
    if (energy > 5) {
      freqDisplay.textContent = label + ' · ' + Math.round(energy);
      freqDisplay.style.color =
        label === 'BODY' ? '#C4622D' :
        label === 'HEART' ? '#C48C50' : '#FDFBE2';
    } else {
      freqDisplay.textContent = '· · ·';
      freqDisplay.style.color = 'rgba(138,125,113,0.4)';
    }
  }
</script>

<!-- Integration formula tooltip -->
<div id="frm-tooltip" role="tooltip" aria-hidden="true"></div>
<script>
(function() {
  const tt  = document.getElementById('frm-tooltip');
  let hideT = null;

  function mk(cls, text) {
    const el = document.createElement('div');
    el.className = cls;
    el.textContent = text;
    return el;
  }

  function show(anchor) {
    clearTimeout(hideT);
    const d = anchor.dataset;
    while (tt.firstChild) tt.removeChild(tt.firstChild);

    tt.appendChild(mk('frm-formula', anchor.textContent.trim()));
    tt.appendChild(mk('frm-title',   d.frmTitle || ''));
    if (d.frmLiteral)  tt.appendChild(mk('frm-literal',  d.frmLiteral));
    if (d.frmHuman)    tt.appendChild(mk('frm-human',    d.frmHuman));
    if (d.frmValidity || d.frmGuardrail) {
      tt.appendChild(mk('frm-sep', ''));
      if (d.frmValidity)   tt.appendChild(mk('frm-validity',   d.frmValidity));
      if (d.frmGuardrail)  tt.appendChild(mk('frm-guardrail',  d.frmGuardrail));
    }

    tt.setAttribute('aria-hidden', 'false');
    const r = anchor.getBoundingClientRect();
    const margin = 14;
    let left = Math.min(r.left, window.innerWidth - 354);
    left = Math.max(margin, left);
    let top = r.top - 320;
    if (top < margin) top = r.bottom + 10;
    tt.style.top  = top  + 'px';
    tt.style.left = left + 'px';
    tt.classList.add('visible');
  }

  function hide() {
    hideT = setTimeout(() => {
      tt.classList.remove('visible');
      tt.setAttribute('aria-hidden', 'true');
    }, 130);
  }

  document.addEventListener('pointerover', e => { const el = e.target.closest('.frm-tip'); if (el) show(el); });
  document.addEventListener('pointerout',  e => { if (e.target.closest('.frm-tip')) hide(); });
  document.addEventListener('focusin',     e => { const el = e.target.closest('.frm-tip'); if (el) show(el); });
  document.addEventListener('focusout',    e => { if (e.target.closest('.frm-tip')) hide(); });
})();
</script>

<script>
  let _isStillnessActivating = false;

    if(_isStillnessActivating) return;
    _isStillnessActivating = true;
    
    if(typeof window.initAudio === 'function') await window.initAudio();
    else if(typeof window.initAtmosphericAudio === 'function') await window.initAtmosphericAudio();
    else if(typeof window.ensureAudioContext === 'function') await window.ensureAudioContext();
    else if(typeof Tone !== 'undefined') await Tone.start();
    
    document.body.classList.add('stillness-active');
    
    let stillnessDrone;
    if(typeof Tone !== 'undefined') {
        stillnessDrone = new Tone.FMSynth({
        harmonicity: 0.5, modulationIndex: 1.2,
        oscillator: { type: "sine" }, modulation: { type: "sine" },
        envelope: { attack: 4, decay: 0, sustain: 1, release: 8 }
        }).toDestination();
        stillnessDrone.volume.value = -12;
        stillnessDrone.triggerAttack("E2");
    }

    let count = 60;
    const cdEl = document.getElementById('stillnessTracker');
    if(cdEl) cdEl.innerText = "TEA ON THE MOON :: 60";
    
    const interval = setInterval(() => {
      count--;
      if(cdEl) cdEl.innerText = "TEA ON THE MOON :: " + count;
      if(count <= 0) {
        clearInterval(interval);
        document.body.classList.remove('stillness-active');
        if(stillnessDrone) stillnessDrone.triggerRelease();
        setTimeout(() => { if(stillnessDrone) stillnessDrone.dispose(); _isStillnessActivating = false; }, 8000);
      }
    }, 1000);
  };
</script>
