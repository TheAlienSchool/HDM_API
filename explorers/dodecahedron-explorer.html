<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dodecahedron Explorer · The Shape You Are Made Of</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400&family=IM+Fell+English:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
    :root{
        --void:#0D0907; --charcoal:#1E1610;
        --sand:#F0E6D2; --sand-mid:#E8D9BC;
        --terra:#C4622D; --gold:#C48C50; --gold-pale:#D4A870;
        --ink-light:#B8A890;
        --font-display:'Playfair Display',Georgia,serif;
        --font-fell:'IM Fell English',Georgia,serif;
        --font-body:'Inter','Helvetica Neue',sans-serif;
        --ease-out:cubic-bezier(0.16,1,0.3,1);
    }
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
    html,body{height:100%;overflow:hidden;background:var(--void);color:var(--sand);font-family:var(--font-body);font-weight:300}

    /* NAV */
    .top-nav{
        position:fixed;top:0;left:0;right:0;height:52px;
        background:rgba(13,9,7,0.92);
        border-bottom:1px solid rgba(196,98,45,0.15);
        backdrop-filter:blur(6px);
        display:flex;align-items:center;justify-content:space-between;
        padding:0 24px;z-index:1000;
    }
    .top-nav-left{font-size:12px;color:var(--ink-light);letter-spacing:0.08em}
    .top-nav-left a{color:var(--terra);text-decoration:none;transition:color .2s}
    .top-nav-left a:hover{color:var(--gold)}
    .top-nav-sep{color:var(--terra);opacity:.5;margin:0 8px}
    .top-nav-right{display:flex;gap:8px}
    .nav-btn{
        padding:6px 12px;font-family:var(--font-body);font-size:11px;
        letter-spacing:0.14em;text-transform:uppercase;
        border:1px solid rgba(196,98,45,0.35);background:transparent;
        color:var(--ink-light);cursor:pointer;border-radius:2px;
        transition:all .25s var(--ease-out);
    }
    .nav-btn:hover{border-color:var(--gold);color:var(--gold)}
    .nav-btn.active{background:rgba(196,140,80,0.15);color:var(--gold);border-color:var(--gold)}

    /* CANVAS */
    #stage{
        position:fixed;top:52px;left:0;right:0;bottom:0;
        background:radial-gradient(ellipse at center,#1a110c 0%,var(--void) 70%);
    }
    #stage canvas{display:block;width:100%;height:100%}

    /* DOTS */
    .journey-dots{
        position:fixed;right:24px;top:50%;transform:translateY(-50%);
        display:flex;flex-direction:column;gap:10px;z-index:500;
    }
    .journey-dot{
        width:10px;height:10px;border-radius:50%;
        border:1px solid rgba(196,140,80,0.4);background:transparent;
        cursor:pointer;padding:0;transition:all .3s var(--ease-out);
        position:relative;
    }
    .journey-dot:hover{border-color:var(--gold);transform:scale(1.2)}
    .journey-dot.active{background:var(--gold);border-color:var(--gold);box-shadow:0 0 12px rgba(196,140,80,0.6)}
    .journey-dot::after{
        content:attr(data-label);
        position:absolute;right:18px;top:50%;transform:translateY(-50%);
        font-family:var(--font-fell);font-size:11px;color:var(--gold);
        opacity:0;pointer-events:none;white-space:nowrap;transition:opacity .25s;
        letter-spacing:0.12em;
    }
    .journey-dot:hover::after,.journey-dot.active::after{opacity:1}

    /* INFO PANEL */
    #panel{
        position:fixed;top:72px;right:24px;bottom:24px;width:340px;max-width:calc(100vw - 48px);
        background:rgba(13,9,7,0.88);
        border:1px solid rgba(196,140,80,0.25);
        backdrop-filter:blur(10px);
        padding:32px 28px;overflow-y:auto;z-index:400;
        transform:translateX(calc(100% + 48px));opacity:0;
        transition:transform .5s var(--ease-out),opacity .5s var(--ease-out);
    }
    #panel.open{transform:translateX(0);opacity:1}
    .panel-close{
        position:absolute;top:14px;right:14px;width:28px;height:28px;
        background:transparent;border:none;color:var(--ink-light);
        font-size:20px;cursor:pointer;line-height:1;
    }
    .panel-close:hover{color:var(--gold)}
    .eyebrow{
        font-family:var(--font-body);font-size:10px;text-transform:uppercase;
        letter-spacing:0.35em;color:var(--terra);margin-bottom:14px;
    }
    .roman{
        font-family:var(--font-display);font-size:72px;line-height:1;
        color:var(--gold);font-weight:400;margin-bottom:8px;
    }
    .face-name{
        font-family:var(--font-display);font-size:28px;line-height:1.15;
        color:var(--sand);font-weight:500;margin-bottom:12px;
    }
    .steep-label{
        font-family:var(--font-fell);font-style:italic;font-size:14px;
        color:var(--gold-pale);letter-spacing:0.04em;margin-bottom:20px;
    }
    .divider{width:40px;height:1px;background:var(--terra);margin:0 0 20px 0;opacity:.6}
    .face-desc{font-family:var(--font-body);font-size:14px;line-height:1.75;color:var(--sand-mid);font-weight:300}
    .freq-badge{
        margin-top:24px;padding-top:18px;border-top:1px solid rgba(196,140,80,0.15);
        font-family:var(--font-body);font-size:11px;letter-spacing:0.14em;
        text-transform:uppercase;color:var(--ink-light);
    }
    .freq-badge strong{color:var(--gold);font-weight:500}

    /* HINT */
    #hint{
        position:fixed;left:24px;bottom:24px;z-index:300;
        font-family:var(--font-fell);font-style:italic;font-size:13px;
        color:var(--ink-light);letter-spacing:0.04em;opacity:.75;
        max-width:280px;line-height:1.6;
    }

    /* MOBILE */
    @media (max-width:760px){
        .top-nav{padding:0 14px}
        .top-nav-left{font-size:11px}
        .journey-dots{right:10px;gap:8px}
        .journey-dot{width:8px;height:8px}
        .journey-dot::after{display:none}
        #panel{
            top:auto;right:0;left:0;bottom:0;width:100%;max-width:100%;
            max-height:60vh;border-left:none;
            border-top:1px solid rgba(196,140,80,0.25);
            transform:translateY(calc(100% + 24px));
        }
        #panel.open{transform:translateY(0)}
        .roman{font-size:56px}
        .face-name{font-size:22px}
        #hint{left:14px;bottom:14px;font-size:11px;max-width:200px}
    }
</style>
</head>
<body>

<nav class="top-nav">
    <div class="top-nav-left">
        <a href="../index.html">HDM Portal</a>
        <span class="top-nav-sep">::</span>
        <a href="index.html">Explorers</a>
        <span class="top-nav-sep">::</span>
        <span>Dodecahedron</span>
    </div>
    <div class="top-nav-right">
        <button class="nav-btn" id="btn-rotate">Auto-Rotate</button>
        <button class="nav-btn" id="btn-journey">Journey</button>
        <button class="nav-btn" id="btn-sound">Sound Off</button>
    </div>
</nav>

<div id="stage"></div>
<div class="journey-dots" id="dots"></div>

<div id="panel" aria-live="polite">
    <button class="panel-close" id="panel-close" aria-label="Close">×</button>
    <div class="eyebrow">The Twelve Faces</div>
    <div class="roman" id="p-roman">I</div>
    <div class="face-name" id="p-name">Seed</div>
    <div class="steep-label" id="p-steep">Steep 1 · Entering</div>
    <div class="divider"></div>
    <div class="face-desc" id="p-desc">—</div>
    <div class="freq-badge">Tone :: <strong id="p-freq">261.63 Hz</strong></div>
</div>

<div id="hint">drag to rotate :: scroll to zoom :: tap a face</div>

<!-- CDN deps only -->
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/build/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/tone@14.8.49/build/Tone.js"></script>

<script>
(function(){
    'use strict';

    var FACES = [
        {roman:'I',    name:'Seed',             steep:'Steep 1 · Entering',     freq:261.63, desc:'The latent potential, resting before the catalyst. Pure, unactivated civilizational memory waiting for the soil.'},
        {roman:'II',   name:'Awakening',        steep:'Steep 2 · Sensing',      freq:293.66, desc:'The rupture of the shell. Awareness stretches out toward light :: the historical moment of collective philosophical realization.'},
        {roman:'III',  name:'Vitality',         steep:'Steep 3 · Full Heat',    freq:329.63, desc:'The violent, unbridled surge of creative energy. A renaissance of chaotic expansion and raw systemic power.'},
        {roman:'IV',   name:'Forming',          steep:'Steep 4 · Form',         freq:349.23, desc:'The structuring of raw vitality into institutions, laws, and boundaries. The architecture of containment.'},
        {roman:'V',    name:'Imagination',      steep:'Steep 5 · Refinement',   freq:392.00, desc:'The collective capacity to dream beyond established forms, synthesizing poetry, science, and the impossible.'},
        {roman:'VI',   name:'Relationship',     steep:'Steep 6 · Integration',  freq:440.00, desc:'The recognition of the Other. Moving beyond isolated expansion into the realization of ecosystems and empathy.'},
        {roman:'VII',  name:'Initiation',       steep:'Steep 7 · The Threshold',freq:493.88, desc:'The crucible. The civilization is tested by a challenge we cannot solve with our current level of consciousness.'},
        {roman:'VIII', name:'Shadow-work',      steep:'Dimension · Depth',      freq:466.16, desc:'The agonizing descent. The society must face the horrors we have created :: our violence, extractions, and lies.'},
        {roman:'IX',   name:'Integration',      steep:'Dimension · Wholeness',  freq:523.25, desc:'The synthesis of light and shadow. We accept our full history and move forward with grounded maturity.'},
        {roman:'X',    name:'Stewardship',      steep:'Dimension · Tending',    freq:587.33, desc:'The shift from consumption to care. Our collective organizes entirely around the protection of the whole.'},
        {roman:'XI',   name:'Generativity',     steep:'Dimension · Legacy',     freq:659.25, desc:'We now build unconditionally for the benefit of lineages and epochs we will never survive to see.'},
        {roman:'XII',  name:'Harvest & Release',steep:'Steep 7 · Return',       freq:698.46, desc:'The Bloom completes. We distill our wisdom into a seed, release it, and gracefully end the cycle.'}
    ];

    var COL_BASE   = new THREE.Color(0x1E1610);
    var COL_EDGE   = new THREE.Color(0xC4622D);
    var COL_HOVER  = new THREE.Color(0xC48C50);
    var COL_ACTIVE = new THREE.Color(0xD4A870);

    function init(){
        var stage = document.getElementById('stage');
        if(!stage){ console.warn('dodeca: #stage missing'); return; }

        var scene = new THREE.Scene();
        var camera = new THREE.PerspectiveCamera(45, 1, 0.1, 100);
        camera.position.set(0, 0, 4);

        var renderer = new THREE.WebGLRenderer({antialias:true, alpha:true});
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setClearColor(0x000000, 0);
        stage.appendChild(renderer.domElement);

        scene.add(new THREE.AmbientLight(0xffffff, 0.55));
        var dir = new THREE.DirectionalLight(0xffd9b3, 0.7);
        dir.position.set(3, 4, 5); scene.add(dir);
        var rim = new THREE.DirectionalLight(0xC4622D, 0.3);
        rim.position.set(-4, -2, -3); scene.add(rim);

        var geom = new THREE.DodecahedronGeometry(1, 0).toNonIndexed();
        var pos = geom.attributes.position;
        var colors = new Float32Array(pos.count * 3);
        for(var i=0;i<pos.count;i++){
            colors[i*3]=COL_BASE.r; colors[i*3+1]=COL_BASE.g; colors[i*3+2]=COL_BASE.b;
        }
        geom.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        geom.computeVertexNormals();

        var mat = new THREE.MeshStandardMaterial({
            vertexColors:true, flatShading:true, roughness:0.65, metalness:0.15, side:THREE.FrontSide
        });
        var mesh = new THREE.Mesh(geom, mat);
        scene.add(mesh);

        var edgeGeom = new THREE.EdgesGeometry(geom, 0.1);
        var edgeMat = new THREE.LineBasicMaterial({color:COL_EDGE, transparent:true, opacity:0.85});
        var edges = new THREE.LineSegments(edgeGeom, edgeMat);
        mesh.add(edges);

        function paintFace(faceId, color){
            var colAttr = geom.attributes.color;
            var start = faceId * 9; // 3 tris × 3 verts per pentagon
            for(var k=0;k<9;k++) colAttr.setXYZ(start+k, color.r, color.g, color.b);
            colAttr.needsUpdate = true;
        }
        function resetFaces(){
            var colAttr = geom.attributes.color;
            for(var i=0;i<colAttr.count;i++) colAttr.setXYZ(i, COL_BASE.r, COL_BASE.g, COL_BASE.b);
            colAttr.needsUpdate = true;
        }

        function resize(){
            var w = stage.clientWidth || window.innerWidth;
            var h = stage.clientHeight || (window.innerHeight - 52);
            renderer.setSize(w, h, false);
            camera.aspect = w / Math.max(h, 1);
            camera.updateProjectionMatrix();
        }
        resize();
        window.addEventListener('resize', resize);
        if(typeof ResizeObserver !== 'undefined'){
            try{ new ResizeObserver(resize).observe(stage); }catch(e){}
        }

        var state = {
            autoRotate:true, journey:false, sound:false,
            hoverFace:-1, activeFace:-1,
            journeyIdx:0, journeyTimer:null,
            dragging:false, lastX:0, lastY:0, downX:0, downY:0,
            targetRotX:0.35, targetRotY:0.6,
            zoom:4, targetZoom:4
        };

        var synth = null;
        function ensureSynth(){
            if(synth) return synth;
            try{
                synth = new Tone.PolySynth(Tone.Synth, {
                    oscillator:{type:'sine'},
                    envelope:{attack:0.04, decay:0.25, sustain:0.3, release:1.4}
                }).toDestination();
                synth.volume.value = -12;
            }catch(e){ console.warn('synth init failed', e); synth=null; }
            return synth;
        }
        function playFace(faceId){
            if(!state.sound) return;
            if(faceId<0 || faceId>=FACES.length) return;
            var s = ensureSynth(); if(!s) return;
            try{
                if(Tone.context.state !== 'running'){ Tone.start(); }
                var f = FACES[faceId].freq;
                s.triggerAttackRelease(f, '2n');
                var tri = new Tone.Synth({oscillator:{type:'triangle'}, envelope:{attack:0.08,decay:0.3,sustain:0.2,release:1.6}}).toDestination();
                tri.volume.value = -22;
                tri.triggerAttackRelease(f*2, '4n');
                setTimeout(function(){ try{tri.dispose();}catch(_){ } }, 2200);
            }catch(e){ console.warn('play failed', e); }
        }

        var raycaster = new THREE.Raycaster();
        var ndc = new THREE.Vector2();
        function pickFace(clientX, clientY){
            var rect = renderer.domElement.getBoundingClientRect();
            ndc.x = ((clientX - rect.left) / rect.width) * 2 - 1;
            ndc.y = -((clientY - rect.top) / rect.height) * 2 + 1;
            raycaster.setFromCamera(ndc, camera);
            var hits = raycaster.intersectObject(mesh, false);
            if(!hits.length) return -1;
            var tri = hits[0].faceIndex;
            if(tri == null) return -1;
            return Math.floor(tri / 3);
        }

        function refreshFaceColors(){
            resetFaces();
            if(state.activeFace >= 0) paintFace(state.activeFace, COL_ACTIVE);
            if(state.hoverFace >= 0 && state.hoverFace !== state.activeFace) paintFace(state.hoverFace, COL_HOVER);
        }

        var panel     = document.getElementById('panel');
        var pRoman    = document.getElementById('p-roman');
        var pName     = document.getElementById('p-name');
        var pSteep    = document.getElementById('p-steep');
        var pDesc     = document.getElementById('p-desc');
        var pFreq     = document.getElementById('p-freq');
        var panelClose= document.getElementById('panel-close');
        var btnRotate = document.getElementById('btn-rotate');
        var btnJourney= document.getElementById('btn-journey');
        var btnSound  = document.getElementById('btn-sound');
        var dotsWrap  = document.getElementById('dots');

        if(dotsWrap){
            for(var di=0; di<FACES.length; di++){
                (function(idx){
                    var b = document.createElement('button');
                    b.className = 'journey-dot';
                    b.setAttribute('data-label', FACES[idx].roman + ' · ' + FACES[idx].name);
                    b.setAttribute('aria-label', FACES[idx].name);
                    b.addEventListener('click', function(){
                        if(state.journey) toggleJourney();
                        selectFace(idx, true);
                    });
                    dotsWrap.appendChild(b);
                })(di);
            }
        }
        var dotNodes = dotsWrap ? dotsWrap.querySelectorAll('.journey-dot') : [];

        function updatePanel(faceId){
            if(faceId<0 || faceId>=FACES.length) return;
            var f = FACES[faceId];
            if(pRoman) pRoman.textContent = f.roman;
            if(pName)  pName.textContent  = f.name;
            if(pSteep) pSteep.textContent = f.steep;
            if(pDesc)  pDesc.textContent  = f.desc;
            if(pFreq)  pFreq.textContent  = f.freq.toFixed(2) + ' Hz';
        }
        function openPanel(){ if(panel) panel.classList.add('open'); }
        function closePanel(){ if(panel) panel.classList.remove('open'); }
        function setActiveDot(idx){
            for(var i=0;i<dotNodes.length;i++){
                dotNodes[i].classList.toggle('active', i===idx);
            }
        }

        var faceCentroids = (function(){
            var arr = [];
            var pAttr = geom.attributes.position;
            for(var f=0; f<12; f++){
                var cx=0,cy=0,cz=0, start=f*9;
                for(var k=0;k<9;k++){
                    cx += pAttr.getX(start+k);
                    cy += pAttr.getY(start+k);
                    cz += pAttr.getZ(start+k);
                }
                arr.push(new THREE.Vector3(cx/9, cy/9, cz/9).normalize());
            }
            return arr;
        })();

        function aimAtFace(faceId){
            if(faceId<0 || faceId>=12) return;
            var n = faceCentroids[faceId];
            state.targetRotY = Math.atan2(n.x, n.z);
            state.targetRotX = -Math.asin(Math.max(-1, Math.min(1, n.y)));
        }

        function selectFace(faceId, playAudio){
            state.activeFace = faceId;
            updatePanel(faceId);
            openPanel();
            setActiveDot(faceId);
            refreshFaceColors();
            aimAtFace(faceId);
            if(playAudio) playFace(faceId);
        }

        var dom = renderer.domElement;
        dom.style.touchAction = 'none';
        dom.style.cursor = 'grab';

        function onPointerDown(e){
            state.dragging = true;
            state.downX = state.lastX = e.clientX;
            state.downY = state.lastY = e.clientY;
            state.autoRotate = false; setBtn(btnRotate, false);
            try{ dom.setPointerCapture(e.pointerId); }catch(_){ }
        }
        function onPointerMove(e){
            if(state.dragging){
                var dx = e.clientX - state.lastX;
                var dy = e.clientY - state.lastY;
                state.lastX = e.clientX; state.lastY = e.clientY;
                state.targetRotY += dx * 0.008;
                state.targetRotX += dy * 0.008;
                state.targetRotX = Math.max(-1.3, Math.min(1.3, state.targetRotX));
            } else {
                var fid = pickFace(e.clientX, e.clientY);
                if(fid !== state.hoverFace){
                    state.hoverFace = fid;
                    refreshFaceColors();
                    dom.style.cursor = fid>=0 ? 'pointer' : 'grab';
                }
            }
        }
        function onPointerUp(e){
            if(!state.dragging) return;
            var moved = Math.abs(e.clientX - state.downX) + Math.abs(e.clientY - state.downY);
            state.dragging = false;
            if(moved < 6){
                var fid = pickFace(e.clientX, e.clientY);
                if(fid >= 0){
                    if(state.journey) toggleJourney();
                    selectFace(fid, true);
                }
            }
        }
        dom.addEventListener('pointerdown', onPointerDown);
        dom.addEventListener('pointermove', onPointerMove);
        dom.addEventListener('pointerup', onPointerUp);
        dom.addEventListener('pointercancel', function(){ state.dragging=false; });

        dom.addEventListener('wheel', function(e){
            e.preventDefault();
            state.targetZoom += e.deltaY * 0.003;
            state.targetZoom = Math.max(2.2, Math.min(7, state.targetZoom));
        }, {passive:false});

        function setBtn(btn, on){ if(btn) btn.classList.toggle('active', !!on); }

        if(btnRotate){
            setBtn(btnRotate, state.autoRotate);
            btnRotate.addEventListener('click', function(){
                state.autoRotate = !state.autoRotate;
                setBtn(btnRotate, state.autoRotate);
            });
        }

        function toggleJourney(){
            state.journey = !state.journey;
            setBtn(btnJourney, state.journey);
            if(state.journey){
                state.journeyIdx = 0;
                selectFace(state.journeyIdx, true);
                state.journeyTimer = setInterval(function(){
                    state.journeyIdx = (state.journeyIdx + 1) % 12;
                    selectFace(state.journeyIdx, true);
                }, 3500);
            } else {
                if(state.journeyTimer){ clearInterval(state.journeyTimer); state.journeyTimer=null; }
            }
        }
        if(btnJourney) btnJourney.addEventListener('click', toggleJourney);

        if(btnSound){
            btnSound.textContent = 'Sound Off';
            btnSound.addEventListener('click', function(){
                state.sound = !state.sound;
                setBtn(btnSound, state.sound);
                btnSound.textContent = state.sound ? 'Sound On' : 'Sound Off';
                if(state.sound){ ensureSynth(); try{ Tone.start(); }catch(_){ } }
            });
        }

        if(panelClose){
            panelClose.addEventListener('click', function(){
                closePanel();
                state.activeFace = -1;
                setActiveDot(-1);
                refreshFaceColors();
            });
        }

        document.addEventListener('visibilitychange', function(){
            if(document.hidden && state.journey) toggleJourney();
        });

        function animate(){
            requestAnimationFrame(animate);
            if(state.autoRotate && !state.dragging && !state.journey){
                state.targetRotY += 0.0025;
            }
            mesh.rotation.x += (state.targetRotX - mesh.rotation.x) * 0.08;
            mesh.rotation.y += (state.targetRotY - mesh.rotation.y) * 0.08;
            state.zoom += (state.targetZoom - state.zoom) * 0.1;
            camera.position.z = state.zoom;
            renderer.render(scene, camera);
        }
        animate();
    }

    window.addEventListener('load', init, {once:true});
})();
</script>
</body>
</html>
