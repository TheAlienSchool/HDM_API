<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dodecahedron Explorer · The Shape You Are Made Of</title>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,700;1,400;1,500;1,700&family=IM+Fell+English:ital@0;1&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    /* ── DESIGN TOKENS ─────────────────────────────────────────── */
    :root {
      --void:       #0D0907;
      --charcoal:   #1E1610;
      --sand:       #F0E6D2;
      --sand-mid:   #E8D9BC;
      --terra:      #C4622D;
      --gold:       #C48C50;
      --ink-light:  #B8A890;
      --font-display: 'Playfair Display', Georgia, serif;
      --font-fell:    'IM Fell English', Georgia, serif;
      --font-body:    'Inter', 'Helvetica Neue', sans-serif;
      --ease-out:   cubic-bezier(0.16, 1, 0.3, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--void);
      color: var(--sand);
      font-family: var(--font-body);
      overflow: hidden;
      opacity: 0;
      transition: opacity 0.8s var(--ease-out);
    }
    body.is-loaded { opacity: 1; }

    /* ── NAV ───────────────────────────────────────────────────── */
    .breadcrumb-nav {
      position: fixed; top: 0; left: 0; right: 0; height: 52px;
      background: rgba(13,9,7,0.93);
      padding: 0 20px;
      border-bottom: 1px solid rgba(196,98,45,0.15);
      z-index: 1000;
      backdrop-filter: blur(6px);
      display: flex; align-items: center; justify-content: space-between;
      font-size: 12px; color: var(--ink-light); letter-spacing: 0.06em;
    }
    .nav-breadcrumb { display: flex; align-items: center; gap: 0; }
    .nav-breadcrumb a {
      color: var(--terra); text-decoration: none; transition: color 0.2s;
    }
    .nav-breadcrumb a:hover { color: var(--gold); }
    .nav-sep { color: var(--terra); opacity: 0.4; margin: 0 8px; }
    .nav-current { color: var(--sand); }

    .nav-controls { display: flex; gap: 6px; align-items: center; }
    .nav-btn {
      padding: 5px 11px;
      border: 1px solid rgba(196,98,45,0.3);
      background: transparent;
      color: var(--ink-light);
      font-family: var(--font-body);
      font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
      cursor: pointer; border-radius: 1px; transition: all 0.2s;
      white-space: nowrap;
    }
    .nav-btn:hover { border-color: var(--terra); color: var(--sand); }
    .nav-btn.active { background: rgba(196,98,45,0.15); color: var(--terra); border-color: var(--terra); }

    /* ── CANVAS CONTAINER ──────────────────────────────────────── */
    #canvas-container {
      position: fixed; top: 52px; left: 0; right: 0; bottom: 0;
      background:
        radial-gradient(circle at 30% 25%, rgba(196,98,45,0.07) 0%, transparent 55%),
        radial-gradient(circle at 75% 80%, rgba(196,140,80,0.04) 0%, transparent 50%),
        var(--charcoal);
      cursor: grab;
      overflow: hidden;
    }
    #canvas-container:active { cursor: grabbing; }
    #canvas { display: block; width: 100%; height: 100%; }

    /* ── FACE BADGE (hover label, top-left of canvas) ───────────── */
    #face-badge {
      position: absolute; top: 16px; left: 56px;
      font-family: var(--font-display); font-size: 13px; font-style: italic;
      color: var(--terra); letter-spacing: 0.06em;
      opacity: 0; transition: opacity 0.25s; pointer-events: none;
      text-shadow: 0 1px 4px rgba(0,0,0,0.6);
    }
    #face-badge.visible { opacity: 1; }

    /* ── CANVAS HINT ────────────────────────────────────────────── */
    .canvas-hint {
      position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
      font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-light); opacity: 0.35; pointer-events: none;
    }
    @media (max-width: 768px) { .canvas-hint { display: none; } }

    /* ── JOURNEY DOTS (vertical, desktop only) ──────────────────── */
    #journey-dots {
      position: fixed; left: 20px; top: 50%; transform: translateY(-50%);
      display: flex; flex-direction: column; gap: 6px; z-index: 200;
    }
    @media (max-width: 768px) { #journey-dots { display: none; } }

    .jdot {
      width: 28px; height: 28px;
      display: flex; align-items: center; justify-content: center;
      background: none; border: none; cursor: pointer; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    .jdot::after {
      content: ''; display: block; width: 6px; height: 6px; border-radius: 50%;
      border: 1px solid rgba(196,98,45,0.3); transition: all 0.35s var(--ease-out);
    }
    .jdot.visited::after { background: var(--terra); border-color: var(--terra); }
    .jdot.current::after { background: var(--gold); border-color: var(--gold); transform: scale(1.6); }

    /* ── FACE PANEL ─────────────────────────────────────────────── */
    #face-panel {
      position: fixed; top: 52px; right: 0; bottom: 0; width: 340px;
      background: rgba(13,9,7,0.97);
      border-left: 1px solid rgba(196,98,45,0.15);
      padding: 36px 28px 28px;
      overflow-y: auto;
      transform: translateX(105%);
      transition: transform 0.38s var(--ease-out);
      z-index: 500;
    }
    #face-panel.open { transform: translateX(0); }

    @media (max-width: 768px) {
      #face-panel {
        width: 100%; top: auto; left: 0; right: 0; bottom: 0;
        height: 54vh; border-left: none;
        border-top: 1px solid rgba(196,98,45,0.15);
        transform: translateY(105%);
        padding: 24px 20px 20px;
      }
      #face-panel.open { transform: translateY(0); }
    }

    /* Panel close button */
    #panel-close {
      position: absolute; top: 14px; right: 14px;
      background: none; border: none; color: var(--ink-light);
      font-size: 18px; line-height: 1; cursor: pointer;
      width: 28px; height: 28px; display: flex; align-items: center; justify-content: center;
      transition: color 0.2s; border-radius: 1px;
    }
    #panel-close:hover { color: var(--terra); }

    /* Panel typography */
    .panel-eyebrow {
      display: block;
      font-family: var(--font-body);
      font-size: 10px; font-weight: 600; letter-spacing: 0.3em; text-transform: uppercase;
      color: var(--terra); margin-bottom: 18px;
    }
    .panel-numeral {
      font-family: var(--font-display);
      font-size: 58px; font-weight: 400; line-height: 1;
      color: var(--gold); margin-bottom: 10px;
    }
    .panel-name {
      font-family: var(--font-fell);
      font-style: italic; font-size: 28px; line-height: 1.15;
      color: var(--sand); margin-bottom: 10px;
    }
    .panel-steep {
      font-family: var(--font-body);
      font-size: 10px; font-weight: 600; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--ink-light); margin-bottom: 22px;
    }
    .panel-divider {
      height: 1px; background: rgba(196,98,45,0.2); margin-bottom: 22px;
    }
    .panel-desc {
      font-family: var(--font-body);
      font-size: 15px; line-height: 1.85; font-weight: 300;
      color: var(--sand-mid);
    }
    .panel-freq {
      margin-top: 28px;
      font-family: var(--font-body);
      font-size: 10px; font-weight: 600; letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(196,140,80,0.4);
    }

    /* Animate panel content on face change */
    .panel-animate {
      animation: panel-enter 0.38s var(--ease-out) both;
    }
    @keyframes panel-enter {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

<!-- ── NAV ─────────────────────────────────────────────────────── -->
<nav class="breadcrumb-nav">
  <div class="nav-breadcrumb">
    <a href="../index.html">← Ecosystem</a>
    <span class="nav-sep">·</span>
    <a href="index.html">Laboratory</a>
    <span class="nav-sep">·</span>

  </div>
  <div class="nav-controls">
    <button id="rotate-btn" class="nav-btn active">Rotate</button>
    <button id="journey-btn" class="nav-btn">Journey</button>
    <button id="sound-btn"   class="nav-btn">Sound</button>
  </div>
</nav>

<!-- ── CANVAS ──────────────────────────────────────────────────── -->
<div id="canvas-container">
  <canvas id="canvas"></canvas>
  <div id="face-badge"></div>
  <div class="canvas-hint">drag · scroll · click a face</div>
</div>

<!-- ── JOURNEY DOTS ─────────────────────────────────────────────── -->
<div id="journey-dots" aria-label="Face navigation"></div>

<!-- ── FACE PANEL ───────────────────────────────────────────────── -->
<aside id="face-panel" aria-label="Face information">
  <button id="panel-close" aria-label="Close panel">×</button>
  <span   id="panel-eyebrow" class="panel-eyebrow"></span>
  <div    id="panel-numeral" class="panel-numeral"></div>
  <div    id="panel-name"    class="panel-name"></div>
  <div    id="panel-steep"   class="panel-steep"></div>
  <div    class="panel-divider"></div>
  <div    id="panel-desc"    class="panel-desc"></div>
  <div    id="panel-freq"    class="panel-freq"></div>
</aside>

<!-- ── CDN: Three.js r128 ───────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<!-- ── CDN: Tone.js 14.8.49 ─────────────────────────────────────── -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/tone/14.8.49/Tone.js"
        integrity="sha512-U49h7qv++IYvU7QjksOuPXWJRsoX0eWX3nz9X2pgNkAEIwjsN5bQB0v4J1igQ1hKFWPF3Ij8qiYKVw8O9WCpg=="
        crossorigin="anonymous" referrerpolicy="no-referrer"></script>

<script>
(function () {
    'use strict';

    // ═══════════════════════════════════════════════════════════════
    // CANONICAL FACE DATA  (source of truth: dodecahedral-capstones.html)
    // ═══════════════════════════════════════════════════════════════
    var FACES = [
        { num: 'I',    name: 'Seed',             steep: 'Steep 1',   label: 'Entering',       freq: 261.63, desc: 'The latent potential, resting before the catalyst. Pure, unactivated civilizational memory waiting for the soil.' },
        { num: 'II',   name: 'Awakening',         steep: 'Steep 2',   label: 'Sensing',         freq: 293.66, desc: 'The rupture of the shell. Awareness stretches out toward light :: the historical moment of collective philosophical realization.' },
        { num: 'III',  name: 'Vitality',          steep: 'Steep 3',   label: 'Full Heat',       freq: 329.63, desc: 'The violent, unbridled surge of creative energy. A renaissance of chaotic expansion and raw systemic power.' },
        { num: 'IV',   name: 'Forming',           steep: 'Steep 4',   label: 'Form',            freq: 349.23, desc: 'The structuring of raw vitality into institutions, laws, and boundaries. The architecture of containment.' },
        { num: 'V',    name: 'Imagination',       steep: 'Steep 5',   label: 'Refinement',      freq: 392.00, desc: 'The collective capacity to dream beyond established forms, synthesizing poetry, science, and the impossible.' },
        { num: 'VI',   name: 'Relationship',      steep: 'Steep 6',   label: 'Integration',     freq: 440.00, desc: 'The recognition of the Other. Moving beyond isolated expansion into the realization of ecosystems and empathy.' },
        { num: 'VII',  name: 'Initiation',        steep: 'Steep 7',   label: 'The Threshold',   freq: 493.88, desc: 'The crucible. The civilization is tested by a challenge we cannot solve with our current level of consciousness.' },
        { num: 'VIII', name: 'Shadow-work',       steep: 'Dimension', label: 'Depth',           freq: 466.16, desc: 'The agonizing descent. The society must face the horrors we have created :: our violence, extractions, and lies.' },
        { num: 'IX',   name: 'Integration',       steep: 'Dimension', label: 'Wholeness',       freq: 523.25, desc: 'The synthesis of light and shadow. We accept our full history and move forward with grounded maturity.' },
        { num: 'X',    name: 'Stewardship',       steep: 'Dimension', label: 'Tending',         freq: 587.33, desc: 'The shift from consumption to care. Our collective organizes entirely around the protection of the whole.' },
        { num: 'XI',   name: 'Generativity',      steep: 'Dimension', label: 'Legacy',          freq: 659.25, desc: 'We now build unconditionally for the benefit of lineages and epochs we will never survive to see.' },
        { num: 'XII',  name: 'Harvest & Release', steep: 'Steep 7',   label: 'Return',          freq: 698.46, desc: 'The Bloom completes. We distill our wisdom into a seed, release it, and gracefully end the cycle.' }
    ];

    // ═══════════════════════════════════════════════════════════════
    // THREE.JS COLOR PALETTE
    // ═══════════════════════════════════════════════════════════════
    var C_TERRA = new THREE.Color(0xC4622D);
    var C_GOLD  = new THREE.Color(0xC48C50);

    // ═══════════════════════════════════════════════════════════════
    // STATE
    // ═══════════════════════════════════════════════════════════════
    var scene, camera, renderer, dodecahedron;
    var raycaster, mouse;
    var colorsAttr = null;

    var mouseDown  = false;
    var dragMoved  = false;
    var mouseStart = { x: 0, y: 0 };

    var autoRotating = true;
    var soundEnabled = false;
    var toneReady    = false;
    var synthSine    = null;
    var synthTri     = null;

    var hoveredFace  = -1;
    var activeFace   = -1;
    var journeyMode  = false;
    var journeyIndex = 0;
    var journeyTimer = null;

    // Cached DOM refs — queried once in init(), never re-queried
    var elBadge, elPanel, elEyebrow, elNumeral, elName, elSteep, elDesc, elFreq;
    var elRotateBtn, elJourneyBtn, elSoundBtn, elCloseBtn;
    var dotEls = [];

    // ═══════════════════════════════════════════════════════════════
    // INIT — called once on window load
    // ═══════════════════════════════════════════════════════════════
    function init() {
        var container = document.getElementById('canvas-container');
        var canvasEl  = document.getElementById('canvas');
        if (!container || !canvasEl) return;

        // Scene
        scene = new THREE.Scene();

        // Camera
        camera = new THREE.PerspectiveCamera(50, container.clientWidth / container.clientHeight, 0.1, 100);
        camera.position.z = 3.2;

        // Renderer
        renderer = new THREE.WebGLRenderer({ canvas: canvasEl, antialias: true, alpha: true });
        renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
        renderer.setSize(container.clientWidth, container.clientHeight);
        renderer.setClearColor(0x000000, 0);

        // Raycaster
        raycaster = new THREE.Raycaster();
        mouse     = new THREE.Vector2();

        // Geometry
        buildDodecahedron();

        // Lights
        scene.add(new THREE.AmbientLight(0xffffff, 0.40));
        var key = new THREE.DirectionalLight(0xF0E6D2, 0.85);
        key.position.set(3, 4, 5);
        scene.add(key);
        var fill = new THREE.DirectionalLight(0xC4622D, 0.22);
        fill.position.set(-3, -2, -4);
        scene.add(fill);

        // Cache static DOM refs before wiring controls
        elBadge      = document.getElementById('face-badge');
        elPanel      = document.getElementById('face-panel');
        elEyebrow    = document.getElementById('panel-eyebrow');
        elNumeral    = document.getElementById('panel-numeral');
        elName       = document.getElementById('panel-name');
        elSteep      = document.getElementById('panel-steep');
        elDesc       = document.getElementById('panel-desc');
        elFreq       = document.getElementById('panel-freq');
        elRotateBtn  = document.getElementById('rotate-btn');
        elJourneyBtn = document.getElementById('journey-btn');
        elSoundBtn   = document.getElementById('sound-btn');
        elCloseBtn   = document.getElementById('panel-close');

        // Controls & UI
        setupMouseControls(container);
        setupTouchControls(container);
        buildJourneyDots();
        setupButtons();

        // Keyboard
        document.addEventListener('keydown', onKeyDown);

        // Visibility change
        document.addEventListener('visibilitychange', function () {
            if (document.hidden && journeyMode) stopJourney();
        });

        // ResizeObserver — INSIDE init() where container is defined
        new ResizeObserver(function () {
            onResize(container);
        }).observe(container);

        animate();
        document.body.classList.add('is-loaded');
    }

    // ═══════════════════════════════════════════════════════════════
    // GEOMETRY
    // DodecahedronGeometry(1,0).toNonIndexed() → 12 penta faces
    // Each pentagon = 3 triangles → 36 triangles → 108 vertices
    // faceIndex from raycaster is per-triangle (0–35)
    // Math.floor(faceIndex / 3) → pentagon index 0–11
    // ═══════════════════════════════════════════════════════════════
    function buildDodecahedron() {
        var geo   = new THREE.DodecahedronGeometry(1, 0).toNonIndexed();
        var count = geo.attributes.position.count; // 108

        var colorData = new Float32Array(count * 3);
        for (var i = 0; i < count; i++) {
            colorData[i * 3]     = C_TERRA.r;
            colorData[i * 3 + 1] = C_TERRA.g;
            colorData[i * 3 + 2] = C_TERRA.b;
        }
        geo.setAttribute('color', new THREE.BufferAttribute(colorData, 3));
        colorsAttr = geo.attributes.color;

        dodecahedron = new THREE.Mesh(geo, new THREE.MeshPhongMaterial({
            vertexColors: true,
            shininess: 30,
            specular: new THREE.Color(0x3A2010)
        }));
        scene.add(dodecahedron);

        // Pentagon edge overlay — indexed geometry for clean lines, child rotates with parent
        var edgeGeo = new THREE.EdgesGeometry(new THREE.DodecahedronGeometry(1, 0));
        dodecahedron.add(new THREE.LineSegments(edgeGeo,
            new THREE.LineBasicMaterial({ color: 0xC48C50, transparent: true, opacity: 0.22 })
        ));
    }

    // Set all 9 vertices of one pentagon face to a given color
    function setFaceColor(faceIdx, color) {
        if (!colorsAttr) return;
        var base = faceIdx * 9; // 9 verts per face (3 triangles × 3)
        for (var v = 0; v < 9; v++) {
            colorsAttr.setXYZ(base + v, color.r, color.g, color.b);
        }
        colorsAttr.needsUpdate = true;
    }

    // ═══════════════════════════════════════════════════════════════
    // RENDER LOOP
    // ═══════════════════════════════════════════════════════════════
    function animate() {
        requestAnimationFrame(animate);
        if (!mouseDown && autoRotating) {
            dodecahedron.rotation.y += 0.003;
            dodecahedron.rotation.x += 0.001;
        }
        renderer.render(scene, camera);
    }

    // ═══════════════════════════════════════════════════════════════
    // RESIZE
    // ═══════════════════════════════════════════════════════════════
    function onResize(container) {
        var w = container.clientWidth;
        var h = container.clientHeight;
        camera.aspect = w / h;
        camera.updateProjectionMatrix();
        renderer.setSize(w, h);
    }

    // ═══════════════════════════════════════════════════════════════
    // HIT TESTING
    // clientToNDC shared by mouse hover, mouse click, and touch tap
    // ═══════════════════════════════════════════════════════════════
    function clientToNDC(clientX, clientY) {
        var rect = renderer.domElement.getBoundingClientRect();
        return {
            x: ((clientX - rect.left) / rect.width)  *  2 - 1,
            y: ((clientY - rect.top)  / rect.height) * -2 + 1
        };
    }

    function getFaceAt(clientX, clientY) {
        var ndc = clientToNDC(clientX, clientY);
        mouse.set(ndc.x, ndc.y);
        raycaster.setFromCamera(mouse, camera);
        var hits = raycaster.intersectObject(dodecahedron);
        if (!hits.length) return -1;
        return Math.floor(hits[0].faceIndex / 3);
    }

    // ═══════════════════════════════════════════════════════════════
    // MOUSE CONTROLS
    // ═══════════════════════════════════════════════════════════════
    function setupMouseControls(container) {
        container.addEventListener('mousedown', function (e) {
            mouseDown  = true;
            dragMoved  = false;
            mouseStart = { x: e.clientX, y: e.clientY };
        });

        container.addEventListener('mousemove', function (e) {
            if (mouseDown) {
                var dx = e.clientX - mouseStart.x;
                var dy = e.clientY - mouseStart.y;
                if (!dragMoved && (Math.abs(dx) > 3 || Math.abs(dy) > 3)) dragMoved = true;
                if (dragMoved) {
                    dodecahedron.rotation.y += dx * 0.007;
                    dodecahedron.rotation.x += dy * 0.007;
                    mouseStart = { x: e.clientX, y: e.clientY };
                }
            } else {
                // Hover — getFaceAt handles NDC conversion
                var face = getFaceAt(e.clientX, e.clientY);
                if (face !== hoveredFace) {
                    if (hoveredFace >= 0 && hoveredFace !== activeFace) setFaceColor(hoveredFace, C_TERRA);
                    hoveredFace = face;
                    if (face >= 0) {
                        if (face !== activeFace) setFaceColor(face, C_GOLD);
                        if (elBadge) {
                            elBadge.textContent = FACES[face].num + ' · ' + FACES[face].name;
                            elBadge.classList.add('visible');
                        }
                    } else {
                        if (elBadge) elBadge.classList.remove('visible');
                    }
                }
            }
        }, { passive: true });

        // mouseup on document so drag-release outside container is caught
        document.addEventListener('mouseup', function (e) {
            if (!mouseDown) return;
            mouseDown = false;
            if (!dragMoved) {
                var face = getFaceAt(e.clientX, e.clientY);
                if (face >= 0) selectFace(face);
            }
            dragMoved = false;
        });

        container.addEventListener('wheel', function (e) {
            e.preventDefault();
            camera.position.z = Math.max(1.8, Math.min(6.5, camera.position.z + e.deltaY * 0.003));
        }, { passive: false });
    }

    // ═══════════════════════════════════════════════════════════════
    // TOUCH CONTROLS
    // touchStart: rolling delta position (updated each touchmove frame)
    // touchOrigin: fixed tap-down position (used only at touchend)
    // ═══════════════════════════════════════════════════════════════
    function setupTouchControls(container) {
        var touchStart    = null;
        var touchOrigin   = null;
        var lastPinchDist = null;

        container.addEventListener('touchstart', function (e) {
            if (e.touches.length === 1) {
                touchOrigin   = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                touchStart    = { x: e.touches[0].clientX, y: e.touches[0].clientY };
                lastPinchDist = null;
            } else if (e.touches.length === 2) {
                lastPinchDist = Math.hypot(
                    e.touches[1].clientX - e.touches[0].clientX,
                    e.touches[1].clientY - e.touches[0].clientY
                );
                touchStart  = null;
                touchOrigin = null;
            }
        }, { passive: true });

        container.addEventListener('touchmove', function (e) {
            if (e.touches.length === 1 && touchStart) {
                var dx = e.touches[0].clientX - touchStart.x;
                var dy = e.touches[0].clientY - touchStart.y;
                dodecahedron.rotation.y += dx * 0.008;
                dodecahedron.rotation.x += dy * 0.008;
                touchStart = { x: e.touches[0].clientX, y: e.touches[0].clientY };
            } else if (e.touches.length === 2 && lastPinchDist !== null) {
                var d = Math.hypot(
                    e.touches[1].clientX - e.touches[0].clientX,
                    e.touches[1].clientY - e.touches[0].clientY
                );
                camera.position.z = Math.max(1.8, Math.min(6.5, camera.position.z - (d - lastPinchDist) * 0.015));
                lastPinchDist = d;
            }
        }, { passive: true });

        container.addEventListener('touchend', function (e) {
            if (e.changedTouches.length === 1 && touchOrigin) {
                var dx = e.changedTouches[0].clientX - touchOrigin.x;
                var dy = e.changedTouches[0].clientY - touchOrigin.y;
                if (Math.abs(dx) < 8 && Math.abs(dy) < 8) {
                    var face = getFaceAt(e.changedTouches[0].clientX, e.changedTouches[0].clientY);
                    if (face >= 0) selectFace(face);
                }
            }
            touchStart  = null;
            touchOrigin = null;
        }, { passive: true });
    }

    // ═══════════════════════════════════════════════════════════════
    // SELECT FACE
    // ═══════════════════════════════════════════════════════════════
    function selectFace(faceIdx) {
        if (activeFace >= 0 && activeFace !== faceIdx) setFaceColor(activeFace, C_TERRA);
        activeFace = faceIdx;
        setFaceColor(faceIdx, C_GOLD);
        updateDots(faceIdx);
        openPanel(faceIdx);
        if (soundEnabled) playSound(faceIdx);
    }

    // ═══════════════════════════════════════════════════════════════
    // FACE PANEL
    // ═══════════════════════════════════════════════════════════════
    function openPanel(faceIdx) {
        if (!elPanel) return;
        var f = FACES[faceIdx];

        if (elEyebrow) elEyebrow.textContent = 'Face ' + f.num;
        if (elNumeral) elNumeral.textContent = f.num;
        if (elName)    elName.textContent    = f.name;
        if (elSteep)   elSteep.textContent   = f.steep + ' · ' + f.label;
        if (elDesc)    elDesc.textContent    = f.desc;
        if (elFreq)    elFreq.textContent    = f.freq + ' Hz';

        [elEyebrow, elNumeral, elName, elSteep, elDesc].forEach(function (el) {
            if (!el) return;
            el.classList.remove('panel-animate');
            void el.offsetWidth; // reflow resets the animation
            el.classList.add('panel-animate');
        });

        elPanel.classList.add('open');
    }

    function closePanel() {
        if (elPanel) elPanel.classList.remove('open');
        if (activeFace >= 0) {
            setFaceColor(activeFace, C_TERRA);
            activeFace = -1;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // JOURNEY DOTS
    // ═══════════════════════════════════════════════════════════════
    function buildJourneyDots() {
        var container = document.getElementById('journey-dots');
        if (!container) return;
        for (var i = 0; i < 12; i++) {
            var btn = document.createElement('button');
            btn.className = 'jdot';
            btn.setAttribute('aria-label', 'Face ' + FACES[i].num + ' – ' + FACES[i].name);
            btn.addEventListener('click', (function (idx) {
                return function () { selectFace(idx); };
            }(i)));
            container.appendChild(btn);
            dotEls.push(btn); // cache ref — avoids getElementById loop in updateDots
        }
    }

    function updateDots(faceIdx) {
        for (var i = 0; i < dotEls.length; i++) {
            dotEls[i].classList.remove('current', 'visited');
            if (i === faceIdx)    dotEls[i].classList.add('current');
            else if (i < faceIdx) dotEls[i].classList.add('visited');
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // JOURNEY MODE
    // ═══════════════════════════════════════════════════════════════
    function startJourney() {
        journeyMode  = true;
        journeyIndex = 0;
        autoRotating = true;
        if (elJourneyBtn) elJourneyBtn.classList.add('active');
        selectFace(0);
        journeyTimer = setTimeout(journeyStep, 3500);
    }

    function journeyStep() {
        if (!journeyMode) return;
        journeyIndex = (journeyIndex + 1) % 12;
        selectFace(journeyIndex);
        journeyTimer = setTimeout(journeyStep, 3500);
    }

    function stopJourney() {
        journeyMode = false;
        clearTimeout(journeyTimer);
        if (elJourneyBtn) elJourneyBtn.classList.remove('active');
    }

    // ═══════════════════════════════════════════════════════════════
    // TOGGLE HELPERS — used by both buttons and keyboard shortcuts
    // ═══════════════════════════════════════════════════════════════
    function toggleJourney() {
        if (journeyMode) stopJourney(); else startJourney();
    }

    function toggleSound() {
        soundEnabled = !soundEnabled;
        if (elSoundBtn) {
            elSoundBtn.classList.toggle('active', soundEnabled);
            elSoundBtn.textContent = soundEnabled ? 'Sound On' : 'Sound';
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // SOUND — Tone.Synth sine + triangle, no Reverb, no OfflineAudioContext
    // ═══════════════════════════════════════════════════════════════
    function ensureTone(callback) {
        if (toneReady) { callback(); return; }
        Tone.start().then(function () {
            synthSine = new Tone.Synth({
                oscillator: { type: 'sine' },
                envelope:   { attack: 0.08, decay: 0.4, sustain: 0.35, release: 2.0 },
                volume:     -16
            }).toDestination();
            synthTri = new Tone.Synth({
                oscillator: { type: 'triangle' },
                envelope:   { attack: 0.12, decay: 0.5, sustain: 0.25, release: 2.2 },
                volume:     -20
            }).toDestination();
            toneReady = true;
            callback();
        }).catch(function (err) {
            console.warn('Tone.start() failed:', err);
        });
    }

    function playSound(faceIdx) {
        ensureTone(function () {
            var hz  = FACES[faceIdx].freq;
            var now = Tone.now();
            synthSine.triggerAttackRelease(hz, '2n', now);
            synthTri.triggerAttackRelease(hz,  '2n', now + 0.05);
        });
    }

    // ═══════════════════════════════════════════════════════════════
    // BUTTON WIRING
    // ═══════════════════════════════════════════════════════════════
    function setupButtons() {
        if (elRotateBtn) {
            elRotateBtn.addEventListener('click', function () {
                autoRotating = !autoRotating;
                elRotateBtn.classList.toggle('active', autoRotating);
            });
        }
        if (elJourneyBtn) elJourneyBtn.addEventListener('click', toggleJourney);
        if (elSoundBtn)   elSoundBtn.addEventListener('click',   toggleSound);
        if (elCloseBtn)   elCloseBtn.addEventListener('click',   closePanel);
    }

    // ═══════════════════════════════════════════════════════════════
    // KEYBOARD
    // ═══════════════════════════════════════════════════════════════
    function onKeyDown(e) {
        switch (e.key) {
            case 'j': case 'J': toggleJourney(); break;
            case 's': case 'S': toggleSound();   break;
            case 'Escape': closePanel(); stopJourney(); break;
        }
    }

    // ═══════════════════════════════════════════════════════════════
    // BOOT — single entry point, once, on window load
    // ═══════════════════════════════════════════════════════════════
    window.addEventListener('load', init, { once: true });

}());
</script>

</body>
</html>
