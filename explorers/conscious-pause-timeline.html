<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conscious Pause · Radial Bloom</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400;1,600&family=Inter:wght@400;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --void: #0B0B0B;
            --terra: #C4622D;
            --gold: #C48C50;
            --luna: #FDFBE2;
            --ink: #8A7D71;
            --rock: 'Inter', monospace;
            --ocean: 'Playfair Display', serif;
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--void);
            color: var(--luna);
            font-family: var(--ocean);
            height: 100vh;
            width: 100vw;
            overflow: hidden;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        /* Unified Sticky Nav */
        .unified-sticky-nav {
            position: sticky; top: 0; left: 0; width: 100%;
            display: flex; justify-content: space-between; align-items: center;
            padding: 24px calc(env(safe-area-inset-right) + 28px);
            background: rgba(10, 6, 4, 0.85); backdrop-filter: blur(12px);
            z-index: 1000; font-family: var(--rock); text-transform: uppercase;
            box-sizing: border-box;
        }
        .unified-sticky-nav a { color: var(--terra); text-decoration: none; transition: color 0.3s; font-size: 0.75rem; letter-spacing: 0.2em; }
        .unified-sticky-nav a:hover { color: var(--gold); }

        /* Session label :: top center */
        .session-label {
            position: absolute; left: 50%; transform: translateX(-50%);
            font-family: var(--rock); font-size: 0.6rem;
            color: var(--ink); letter-spacing: 0.3em; text-transform: uppercase;
            white-space: nowrap; opacity: 0.7; pointer-events: none;
        }

        /* Radial Bloom Engine (SVG) */
        #bloom-svg {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 100vmax; height: 100vmax; /* large enough to fill screen */
            pointer-events: none;
            z-index: 10;
        }
        
        .bloom-ring {
            fill: none;
            stroke: var(--gold);
            stroke-width: 0.75px;
            vector-effect: non-scaling-stroke;
            transform-origin: center;
            transition: r 2.5s cubic-bezier(0.16, 1, 0.3, 1), 
                        stroke-opacity 2.5s cubic-bezier(0.16, 1, 0.3, 1),
                        stroke-width 2.5s cubic-bezier(0.16, 1, 0.3, 1);
        }

        /* The Ever-Present Origin (Interactive Seed) */
        #origin-seed {
            position: fixed;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            width: 18px; height: 18px;
            border-radius: 50%;
            background: transparent;
            border: 1px solid var(--gold);
            cursor: pointer;
            z-index: 100;
            transition: transform 0.4s ease, background 0.4s;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        #origin-seed::after {
            content: '';
            position: absolute;
            width: 4px; height: 4px;
            border-radius: 50%;
            background: var(--gold);
            transition: transform 0.4s;
        }
        #origin-seed:hover { transform: translate(-50%, -50%) scale(1.4); background: rgba(196,140,80,0.1); }
        #origin-seed:hover::after { transform: scale(0); }
        #origin-seed.pulse { animation: origin-pulse 2s cubic-bezier(0.16, 1, 0.3, 1) infinite; }
        
        @keyframes origin-pulse {
            0% { box-shadow: 0 0 0 0 rgba(196,140,80,0.5); }
            70% { box-shadow: 0 0 0 30px rgba(196,140,80,0); }
            100% { box-shadow: 0 0 0 0 rgba(196,140,80,0); }
        }

        #action-hint {
            position: fixed;
            bottom: 48px; left: 50%;
            transform: translateX(-50%);
            font-family: var(--rock); font-size: 0.55rem;
            letter-spacing: 0.35em; text-transform: uppercase;
            color: var(--terra); opacity: 0;
            transition: opacity 1s;
            z-index: 300;
            pointer-events: none;
            animation: breathe-hint 3s ease-in-out infinite;
        }
        @keyframes breathe-hint {
            0%, 100% { opacity: 0.35; } 50% { opacity: 0.85; }
        }

        /* Information Overlay (Center aligned) */
        #stage-display {
            position: absolute; 
            top: 50%; left: 50%; 
            transform: translate(-50%, -50%);
            z-index: 50;
            text-align: center;
            pointer-events: none; 
            max-width: 500px;
        }

        #stage-number {
            font-family: var(--rock);
            font-size: clamp(0.65rem, 1vw, 0.85rem);
            color: var(--terra);
            letter-spacing: 0.4em;
            text-transform: uppercase;
            margin-bottom: 2rem; /* increased space above word */
            opacity: 0;
            transform: translateY(14px);
            transition: opacity 0.8s 0.1s, transform 0.8s 0.1s;
        }

        #stage-word {
            font-family: var(--ocean);
            font-size: clamp(3.5rem, 7vw, 7rem);
            font-style: italic;
            font-weight: 400;
            color: var(--luna);
            line-height: 1;
            margin-bottom: 2rem;
            opacity: 0;
            transform: scale(0.95);
            transition: opacity 1s 0.2s, transform 1s 0.2s;
        }

        /* Position the equation ABOVE the text but far enough to let the word breathe */
        #stage-equation {
            font-family: var(--rock);
            font-size: clamp(0.7rem, 1.3vw, 0.85rem);
            color: var(--gold);
            letter-spacing: 0.22em;
            margin-bottom: 2rem;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.8s 0.3s, transform 0.8s 0.3s;
            pointer-events: auto; /* for tooltips */
        }

        /* Description text sitting below the center, physically anchored */
        #stage-text {
            font-family: var(--ocean);
            font-size: clamp(1.05rem, 1.3vw, 1.15rem);
            color: var(--ink);
            line-height: 1.8;
            opacity: 0;
            transform: translateY(12px);
            transition: opacity 0.8s 0.4s, transform 0.8s 0.4s;
        }

        .active #stage-number,
        .active #stage-word,
        .active #stage-equation,
        .active #stage-text {
            opacity: 1;
            transform: translateY(0) scale(1);
        }

        .intro-stage #stage-word { color: rgba(253,251,226,0.55); font-size: clamp(2.5rem, 5vw, 4.5rem); }
        .intro-stage #stage-equation { color: rgba(138,125,113,0.6); }

        /* Sonnet Engine */
        #sonnet-engine {
            position: fixed;
            bottom: 40px; left: 40px;
            z-index: 300;
            max-width: 320px;
        }

        #sonnet-label {
            font-family: var(--rock);
            font-size: 0.45rem;
            letter-spacing: 0.35em;
            text-transform: uppercase;
            color: rgba(138,125,113,0.55);
            margin-bottom: 8px;
            opacity: 0;
            transition: opacity 0.8s;
        }

        #sonnet-transmission {
            font-family: var(--ocean);
            font-size: clamp(0.8rem, 1.2vw, 1rem);
            font-style: italic;
            color: rgba(196,140,80,0.85);
            line-height: 1.6;
            letter-spacing: 0.02em;
            min-height: 2.5em;
            opacity: 0;
            transition: opacity 0.6s;
        }

        .eq-tip {
            cursor: help;
            border-bottom: 1px dashed rgba(196,140,80,0.4);
            transition: border-color 0.2s, color 0.2s;
            display: inline;
        }
        .eq-tip:hover { border-bottom-color: var(--gold); color: var(--luna); outline: none; }

        /* Tooltip */
        #cp-tooltip {
            position: fixed; z-index: 9999; max-width: 360px;
            padding: 18px 20px; background: rgba(8,8,8,0.98);
            border: 1px solid rgba(196,98,45,0.25);
            box-shadow: 0 16px 48px rgba(0,0,0,0.8);
            pointer-events: none; opacity: 0; transition: opacity 0.2s;
        }
        #cp-tooltip.visible { opacity: 1; }
        .cpt-formula { font-family: var(--rock); font-size: 0.6rem; color: var(--terra); letter-spacing: 0.22em; text-transform: uppercase; margin-bottom: 6px; }
        .cpt-title { font-family: var(--ocean); font-size: 1.1rem; font-style: italic; color: var(--luna); margin-bottom: 12px; }
        .cpt-literal { font-family: var(--rock); font-size: 0.75rem; color: var(--ink); line-height: 1.7; margin-bottom: 12px; }
        .cpt-human { font-family: var(--ocean); font-size: 0.95rem; font-style: italic; color: rgba(253,251,226,0.75); line-height: 1.8; margin-bottom: 12px; border-left: 1px solid rgba(196,140,80,0.25); padding-left: 14px; }
        .cpt-validity, .cpt-guardrail { font-family: var(--rock); font-size: 0.6rem; letter-spacing: 0.15em; line-height: 1.6; }
        .cpt-validity { color: rgba(196,140,80,0.5); } .cpt-validity::before { content: '✓  '; }
        .cpt-guardrail { color: rgba(196,98,45,0.55); margin-top: 6px; } .cpt-guardrail::before { content: '·  '; }

        /* Receipt Button */
        #btn-capture {
            position: fixed;
            bottom: 40px; right: 40px;
            background: transparent;
            border: 1px solid rgba(196,98,45,0.4);
            color: var(--terra);
            font-family: var(--rock);
            font-size: 0.65rem;
            letter-spacing: 0.25em;
            text-transform: uppercase;
            padding: 12px 24px;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0; pointer-events: none;
            z-index: 500;
        }
        #btn-capture.ready { opacity: 1; pointer-events: auto; }
        #btn-capture:hover { background: rgba(196,98,45,0.1); color: var(--gold); }
    </style>

<!-- ── FRAGMENTARY NAVIGATION & STILLNESS NODE ── -->
<style>
.orbital-hub { position: fixed; top: 24px; left: 24px; z-index: 10000; }
.orbital-hub a { text-decoration: none; color: var(--copper, #C4622D); font-size: 1.2rem; opacity: 0.4; transition: all 0.3s ease; font-family: sans-serif; }
.orbital-hub a:hover { opacity: 1; transform: scale(1.1); color: var(--parchment, #F0E6D2); text-shadow: 0 0 12px var(--copper, #C4622D); }

.stillness-node { position: fixed; top: 24px; right: 24px; z-index: 10001; color: var(--ash, #8B7D6B); font-size: 1.2rem; cursor: pointer; opacity: 0.4; transition: all 0.3s ease; font-family: sans-serif; }
.stillness-node:hover { opacity: 1; color: var(--copper, #C4622D); text-shadow: 0 0 12px var(--copper, #C4622D); transform: scale(1.1); }

body.stillness-active > *:not(.stillness-countdown):not(.orbital-hub):not(script):not(style) { opacity: 0 !important; pointer-events: none !important; transition: opacity 3s ease-in-out !important; }
body.stillness-active { background-color: #050403 !important; transition: background-color 3s ease-in-out !important; }

.stillness-countdown { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); font-family: 'Space Mono', 'Inconsolata', monospace; font-size: 0.8rem; letter-spacing: 0.4em; color: var(--ash, #8B7D6B); opacity: 0; pointer-events: none; transition: opacity 2s ease; z-index: 10000; }
body.stillness-active .stillness-countdown { opacity: 0.6 !important; }
body.stillness-active .stillness-node { opacity: 0 !important; pointer-events: none !important; }
</style>

</head>
<body>

<!-- UNIFIED STICKY FRAGMENTARY NAVIGATION & STILLNESS NODE -->
<nav class="unified-sticky-nav">
    <div style="display: flex; gap: 20px; align-items: center;">
        <div class="orbital-hub" style="position: relative; top: auto; left: auto; z-index: auto;">
            <a href="../index.html" title="Return to Hub">⎈</a>
        </div>
        <a href="index.html">← RETURN TO EXPLORERS</a>
    </div>
    <div class="session-label">Temporal Bloom · Phase State Evolution</div>
    <div class="stillness-node" onclick="initiateStillness()" title="Tea on the Moon Protocol" style="position: relative; top: auto; right: auto; z-index: auto;">⊙</div>
</nav>

<div class="stillness-countdown" id="stillnessTracker">TEA ON THE MOON :: 60</div>

    <!-- The Radial Geometry -->
    <svg id="bloom-svg" viewBox="0 0 1000 1000" preserveAspectRatio="xMidYMid meet"></svg>

    <!-- The Interactive Catalyst -->
    <div id="origin-seed" class="pulse"></div>

    <div id="action-hint">· AWAITING CONTACT ·</div>

    <div id="stage-display">
        <div id="stage-number"></div>
        <div id="stage-word"></div>
        <div id="stage-equation"></div>
        <div id="stage-text"></div>
    </div>

    <!-- Sonnet Engine -->
    <div id="sonnet-engine">
        <div id="sonnet-label">· TRANSMISSION ·</div>
        <div id="sonnet-transmission"><span id="sonnet-text"></span></div>
    </div>

    <button id="btn-capture">[ SECURE RECEIPT ]</button>

<script>
const stages = [
  {
    num: '·', word: 'The Conscious Pause',
    equation: 'PAUSE · BREATHE · OBSERVE · CHOOSE',
    text: 'Time operates natively as a Bloom. The origin is ever-present. Touch the center to unfold consciousness.',
    transmission: 'silence holds the shape of what is coming',
    isIntro: true
  },
  {
    num: 'I · PAUSE', word: 'Pause.',
    equation: 'signal : noise = 1 : ∞',
    eqTitle: 'Infinite noise, one signal',
    eqLiteral: 'In signal processing, signal-to-noise ratio describes how much meaningful signal is present relative to background interference. At ratio 1:∞ the signal is present but completely obscured.',
    eqHuman: 'At the moment of stopping, your signal :: your actual knowing :: is still there. It has not disappeared. It is the first moment of the ratio. The noise is infinite only temporarily. The pause is the act of holding the 1 steady while the ∞ begins to decay.',
    eqValidity: 'Signal-to-noise ratio is a precise engineering concept. The HDM application is metaphorical.',
    eqGuardrail: 'The noise does not actually equal infinity. The value of the equation is the posture it invites.',
    text: 'The first gesture is radical. To stop is not absence :: it is the creation of a receiving vessel. The mind revolts. Noise rushes in to claim the silence before it can form. Stay anyway.',
    transmission: 'the gap is not emptiness :: it is architecture'
  },
  {
    num: 'II · BREATHE', word: 'Breathe.',
    equation: 'Δ(seeking) → 0',
    eqTitle: 'The rate of search approaching rest',
    eqLiteral: 'Delta (Δ) represents change. Written as Δ(seeking), it describes the rate at which seeking is happening :: how quickly the mind moves from one target to the next. As this approaches 0, the movement slows without fully stopping.',
    eqHuman: 'Breath does not eliminate seeking. It reduces the rate of it. The arrow toward zero is the exhale. You do not arrive at stillness. You approach it :: and that approach is enough.',
    eqValidity: 'The notation is borrowed from calculus and physics with poetic license.',
    eqGuardrail: 'This is not a prescription for zero-seeking as a permanent state. The goal is calibration.',
    text: 'The body knows what the mind is still negotiating. Each exhale reduces the rate of search. The panic curve flattens toward resting. This is not relaxation :: it is calibration.',
    transmission: 'the body already carries the answer'
  },
  {
    num: 'III · OBSERVE', word: 'Observe.',
    equation: 'awareness = ∫ attention dt',
    eqTitle: 'Wholeness from accumulated attention',
    eqLiteral: 'An integral accumulates a quantity over time. ∫ attention dt means: sum all the moments of attention across time t.',
    eqHuman: 'Awareness is not a single act of noticing. It is built from the accumulation of every moment you chose to pay attention. You cannot manufacture awareness on demand. You can only tend the integral.',
    eqValidity: 'Integral calculus is mathematically precise. The application to awareness is conceptual.',
    eqGuardrail: 'The constant of integration (C) applies here too: your baseline awareness before any deliberate attention began. It was never zero.',
    text: 'What was always present becomes perceptible. Not new information :: restored access. The field obscured by seeking opens. This is not insight arriving. It is recognition returning.',
    transmission: 'what arrives was always present'
  },
  {
    num: 'IV · CHOOSE', word: 'Choose.',
    equation: 'response = signal − noise',
    eqTitle: 'The filtered self',
    eqLiteral: 'In signal processing, the useful output is obtained by subtracting noise from the received signal. What remains is the actual message.',
    eqHuman: 'After pausing, breathing, and observing :: the noise has reduced enough that subtraction is possible. The response you choose now carries less of what was imposed on you and more of what you actually are.',
    eqValidity: 'Signal subtraction is a standard engineering operation. Applied to human response, it is a precise metaphor.',
    eqGuardrail: 'Noise is never fully eliminated. Real choosing always contains some residual noise.',
    text: 'After the pause, after breath, after observation :: what emerges is not reaction. It has been filtered. It carries the frequency of what you actually are, not what the stimulus demands.',
    transmission: 'the self, distilled, finally audible'
  }
];

let stageIdx = 0;
const svg = document.getElementById('bloom-svg');
const display = document.getElementById('stage-display');
const nEl = document.getElementById('stage-number');
const wEl = document.getElementById('stage-word');
const eEl = document.getElementById('stage-equation');
const tEl = document.getElementById('stage-text');
const seed = document.getElementById('origin-seed');
const btnCapture = document.getElementById('btn-capture');
const hint = document.getElementById('action-hint');
const sonnetText = document.getElementById('sonnet-text');
const sonnetLabel = document.getElementById('sonnet-label');
const sonnetTransm = document.getElementById('sonnet-transmission');

// Tooltip logic
const tooltip = document.createElement('div');
tooltip.id = 'cp-tooltip';
tooltip.innerHTML = '<div class="cpt-formula"></div><div class="cpt-title"></div><div class="cpt-literal"></div><div class="cpt-human"></div><div class="cpt-validity"></div><div class="cpt-guardrail"></div>';
document.body.appendChild(tooltip);

const initStage = (idx) => {
    display.classList.remove('active');
    setTimeout(() => {
        const s = stages[idx];
        display.classList.toggle('intro-stage', !!s.isIntro);
        nEl.textContent = s.num;
        wEl.textContent = s.word;
        
        while(eEl.firstChild) eEl.removeChild(eEl.firstChild);
        if(s.eqTitle) {
            const span = document.createElement('span');
            span.className = 'eq-tip';
            span.textContent = s.equation;
            span.onmouseenter = (e) => showTooltip(e, s);
            span.onmouseleave = hideTooltip;
            eEl.appendChild(span);
        } else {
            eEl.textContent = s.equation;
        }

        tEl.textContent = s.text;
        display.classList.add('active');

        // Type transmission
        sonnetText.textContent = '';
        sonnetLabel.style.opacity = '1';
        sonnetTransm.style.opacity = '1';
        let words = s.transmission.split(' ');
        let i = 0;
        function typeW() {
            if(i >= words.length) return;
            sonnetText.textContent += (i>0?' ':'') + words[i];
            i++;
            setTimeout(typeW, 120 + Math.random()*60);
        }
        setTimeout(typeW, 800);

        if(idx === 4) btnCapture.classList.add('ready');

        // Radial expansion geometry
        if (idx > 0) pullRadialTension(idx);

    }, 600);
}

const showTooltip = (e, data) => {
    tooltip.querySelector('.cpt-formula').textContent = data.equation;
    tooltip.querySelector('.cpt-title').textContent = data.eqTitle;
    tooltip.querySelector('.cpt-literal').textContent = data.eqLiteral;
    tooltip.querySelector('.cpt-human').textContent = data.eqHuman;
    tooltip.querySelector('.cpt-validity').textContent = data.eqValidity;
    tooltip.querySelector('.cpt-guardrail').textContent = data.eqGuardrail;
    
    // Position tooltip 
    const rect = e.target.getBoundingClientRect();
    tooltip.style.left = Math.max(20, rect.left - 180 + (rect.width/2)) + 'px';
    tooltip.style.top = (rect.bottom + 15) + 'px';
    tooltip.classList.add('visible');
}
const hideTooltip = () => tooltip.classList.remove('visible');

// Bloom Logic: When we advance, existing rings expand outward, and a new inner ring forms.
const rings = [];
const pullRadialTension = (stage) => {
    // Expand existing rings 
    // Radii structure outwards from center (1000x1000 svg -> center is 500,500)
    // 1st ring goes to 140, 2nd 240, 3rd 340, 4th 440
    rings.forEach((ring, index) => {
        const structuralIndex = rings.length - index; // 1 is newest, higher is older (further out)
        const targetRadius = 150 + (structuralIndex * 110);
        const opacity = Math.max(0.05, 0.4 - (structuralIndex * 0.08));
        ring.setAttribute('r', targetRadius);
        ring.style.strokeOpacity = opacity;
    });

    // Create a new inner ring for the new tension
    const innerRing = document.createElementNS("http://www.w3.org/2000/svg", "circle");
    innerRing.setAttribute('cx', 500);
    innerRing.setAttribute('cy', 500);
    innerRing.setAttribute('r', 20); // starts inside the seed
    innerRing.setAttribute('class', 'bloom-ring');
    svg.appendChild(innerRing);
    
    // Trigger expansion formula in next frame
    requestAnimationFrame(() => {
        requestAnimationFrame(() => {
            innerRing.setAttribute('r', 150); // The active dwell boundary
            innerRing.style.strokeOpacity = 0.5;
            rings.push(innerRing);
        });
    });
}

// Global Tone Synthesis simulation for clicking the seed
seed.addEventListener('click', () => {
    if(stageIdx >= 4) {
        // Complete, burst slightly and remain
        seed.style.transform = "translate(-50%, -50%) scale(0.6)";
        setTimeout(() => seed.style.transform = "", 200);
        return;
    }
    
    // Seed feedback
    seed.style.transform = "translate(-50%, -50%) scale(0.4)";
    setTimeout(() => seed.style.transform = "translate(-50%, -50%) scale(1)", 300);
    
    seed.classList.remove('pulse');
    hint.style.opacity = '0';
    if(stageIdx === 0) hint.textContent = '· TO ADVANCE, TOUCH THE ORIGIN ·';
    setTimeout(() => { if(stageIdx < 4) hint.style.opacity = ''; }, 3000);

    stageIdx++;
    // Global PJAX tone bridge call (if tone is routed through app.js)
    if(window._hasPinged && window.portalPingEngine) {
        window.portalPingEngine.triggerGlobalPing(); // the root tone
    }
    
    initStage(stageIdx);
});

// Boot
initStage(0);
setTimeout(() => hint.style.opacity = '1', 2000);

// Capture implementation (from original)
btnCapture.addEventListener('click', () => {
  const xCnv = document.createElement('canvas'); xCnv.width = 1000; xCnv.height = 1300;
  const x = xCnv.getContext('2d'); x.scale(2.5, 2.5); 
  
  x.fillStyle = '#0B0B0B'; x.fillRect(0, 0, 400, 520);
  x.strokeStyle = 'rgba(196,98,45,0.15)'; x.lineWidth = 1;
  x.strokeRect(20, 20, 360, 480);
  x.beginPath(); x.moveTo(20, 60); x.lineTo(380, 60); x.stroke();
  x.beginPath(); x.moveTo(20, 440); x.lineTo(380, 440); x.stroke();
  x.beginPath(); x.moveTo(140, 190); x.lineTo(140, 390); x.stroke();
  
  x.font = "8px 'Inter', monospace"; x.fillStyle = 'rgba(196,140,80,0.6)';
  x.textAlign = 'left'; x.fillText("RADIAL BLOOM OBSERVATORY", 30, 40);
  x.textAlign = 'right'; x.fillText("SESSION VI", 370, 40);
  
  x.textAlign = 'left'; x.fillStyle = 'rgba(138,125,113,0.8)';
  x.fillText("RECEIPT OF EXPANSION", 30, 85);
  
  x.fillStyle = 'rgba(253,251,226,0.9)'; x.font = "italic 34px 'Playfair Display', serif"; x.fillText("Conscious Pause", 28, 125);
  
  const link = document.createElement('a');
  link.download = `hdm-radial-receipt-${Date.now()}.png`;
  link.href = xCnv.toDataURL('image/png');
  link.click();
});
</script>
<script src="../js/app.js"></script>

<!-- TEA ON THE MOON PROTOCOL -->
<script>
  let _isStillnessActivating = false;
  window.initiateStillness = async function() {
    if(_isStillnessActivating) return;
    _isStillnessActivating = true;
    
    if(typeof window.initAudio === 'function') await window.initAudio();
    else if(typeof window.initAtmosphericAudio === 'function') await window.initAtmosphericAudio();
    else if(typeof window.ensureAudioContext === 'function') await window.ensureAudioContext();
    else if(typeof Tone !== 'undefined') await Tone.start();
    
    document.body.classList.add('stillness-active');
    
    let stillnessDrone;
    if(typeof Tone !== 'undefined') {
        stillnessDrone = new Tone.FMSynth({
        harmonicity: 0.5, modulationIndex: 1.2,
        oscillator: { type: "sine" }, modulation: { type: "sine" },
        envelope: { attack: 4, decay: 0, sustain: 1, release: 8 }
        }).toDestination();
        stillnessDrone.volume.value = -12;
        stillnessDrone.triggerAttack("E2");
    }

    let count = 60;
    const cdEl = document.getElementById('stillnessTracker');
    if(cdEl) cdEl.innerText = "TEA ON THE MOON :: 60";
    
    const interval = setInterval(() => {
      count--;
      if(cdEl) cdEl.innerText = "TEA ON THE MOON :: " + count;
      if(count <= 0) {
        clearInterval(interval);
        document.body.classList.remove('stillness-active');
        if(stillnessDrone) stillnessDrone.triggerRelease();
        setTimeout(() => { if(stillnessDrone) stillnessDrone.dispose(); _isStillnessActivating = false; }, 8000);
      }
    }, 1000);
  };
</script>

</html>
