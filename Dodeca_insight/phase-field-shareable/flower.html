<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Phase Field</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; overflow: hidden; font-family: -apple-system, sans-serif; }
    canvas { display: block; width: 100vw; height: 100vh; }
    
    .control-panel {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(10, 10, 20, 0.92);
      border: 1px solid rgba(255, 255, 255, 0.15);
      border-radius: 12px;
      padding: 16px;
      width: 340px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      overflow-x: hidden;
      z-index: 200;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255, 255, 255, 0.8);
      scrollbar-width: thin;
      scrollbar-color: rgba(255,255,255,0.2) transparent;
      overscroll-behavior: contain;
      touch-action: pan-y;
    }
    
    .control-panel::-webkit-scrollbar {
      width: 6px;
    }
    
    .control-panel::-webkit-scrollbar-thumb {
      background: rgba(255,255,255,0.2);
      border-radius: 3px;
    }
    
    .control-panel h3 {
      font-size: 10px;
      text-transform: uppercase;
      letter-spacing: 0.15em;
      color: rgba(255, 255, 255, 0.5);
      margin: 12px 0 8px 0;
      padding-bottom: 4px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    .control-panel h3:first-child {
      margin-top: 0;
    }
    
    .control-row {
      display: flex;
      align-items: center;
      margin-bottom: 8px;
      gap: 8px;
    }
    
    .control-row label {
      flex: 0 0 90px;
      font-size: 10px;
      color: rgba(255, 255, 255, 0.6);
    }
    
    .control-row input[type="range"] {
      flex: 1;
      height: 6px;
      -webkit-appearance: none;
      background: rgba(255, 255, 255, 0.1);
      border-radius: 3px;
      outline: none;
      touch-action: pan-x;
      cursor: pointer;
      padding: 8px 0;
      margin: -8px 0;
      background-clip: content-box;
    }
    
    .control-row input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 18px;
      height: 18px;
      background: #22d3ee;
      border-radius: 50%;
      cursor: pointer;
      box-shadow: 0 0 8px rgba(34, 211, 238, 0.5);
    }
    
    .control-row input[type="range"]::-moz-range-thumb {
      width: 18px;
      height: 18px;
      background: #22d3ee;
      border-radius: 50%;
      cursor: pointer;
      border: none;
    }
    
    .control-row .value {
      flex: 0 0 55px;
      text-align: right;
      font-size: 10px;
      color: #22d3ee;
    }
    
    .control-row.log-control {
      flex-wrap: wrap;
    }
    
    .log-buttons {
      display: flex;
      gap: 4px;
      flex: 1;
      justify-content: center;
    }
    
    .log-btn {
      background: rgba(255, 255, 255, 0.08);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      padding: 4px 8px;
      border-radius: 4px;
      cursor: pointer;
      transition: all 0.15s ease;
      min-width: 32px;
    }
    
    .log-btn:hover {
      background: rgba(34, 211, 238, 0.2);
      border-color: rgba(34, 211, 238, 0.4);
    }
    
    .log-btn:active {
      background: rgba(34, 211, 238, 0.3);
      transform: scale(0.95);
    }
    
    .log-btn.magnitude {
      font-weight: bold;
      min-width: 40px;
    }
    
    .log-value-display {
      flex: 0 0 70px;
      text-align: center;
      font-size: 11px;
      color: #22d3ee;
      background: rgba(0, 0, 0, 0.3);
      padding: 4px 6px;
      border-radius: 4px;
      font-family: 'JetBrains Mono', monospace;
    }
    
    .control-row.locked label {
      color: rgba(255, 255, 255, 0.3);
    }
    
    .control-row.locked input[type="range"]::-webkit-slider-thumb {
      background: rgba(255, 255, 255, 0.3);
      box-shadow: none;
    }
    
    .control-row.locked .value {
      color: rgba(255, 255, 255, 0.3);
    }
    
    .lock-btn {
      flex: 0 0 20px;
      width: 20px;
      height: 20px;
      background: none;
      border: 1px solid rgba(255, 255, 255, 0.2);
      border-radius: 4px;
      color: rgba(255, 255, 255, 0.4);
      font-size: 10px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.2s;
    }
    
    .lock-btn:hover {
      border-color: rgba(255, 255, 255, 0.4);
      color: rgba(255, 255, 255, 0.7);
    }
    
    .lock-btn.locked {
      background: rgba(244, 208, 63, 0.2);
      border-color: rgba(244, 208, 63, 0.5);
      color: #f4d03f;
    }
    
    .panel-toggle {
      position: fixed;
      top: 20px;
      right: 20px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 201;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .panel-toggle.hidden {
      display: none;
    }
    
    .control-panel.hidden {
      display: none;
    }
    
    .fullscreen-btn {
      position: fixed;
      top: 20px;
      left: 20px;
      background: rgba(20, 20, 35, 0.8);
      border: 1px solid rgba(255, 255, 255, 0.15);
      color: rgba(255, 255, 255, 0.7);
      font-size: 16px;
      width: 36px;
      height: 36px;
      border-radius: 8px;
      cursor: pointer;
      z-index: 201;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    
    .fullscreen-btn:hover {
      background: rgba(30, 30, 50, 0.9);
      border-color: rgba(255, 255, 255, 0.3);
    }
    
  </style>
</head>
<body>
  <canvas id="c"></canvas>
  
  <button class="fullscreen-btn" id="fullscreenBtn" title="Toggle fullscreen">⛶</button>
  <button class="panel-toggle" id="panelToggle">⚙</button>
  
  <div class="control-panel hidden" id="controlPanel">
    <h3>Structure</h3>
    <div class="control-row" data-param="numPetals">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>numPetals</label>
      <input type="range" min="3" max="15" step="0.01">
      <span class="value">5.00</span>
    </div>
    <div class="control-row" data-param="flowerSize">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>flowerSize</label>
      <input type="range" min="2" max="12" step="0.1">
      <span class="value">5.0</span>
    </div>
    <div class="control-row" data-param="petalCurve">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>petalCurve</label>
      <input type="range" min="0" max="2" step="0.01">
      <span class="value">0.50</span>
    </div>
    
    <h3>Wave / Temporal</h3>
    <div class="control-row" data-param="waveStrength">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>waveStrength</label>
      <input type="range" min="0" max="28" step="0.1">
      <span class="value">0.40</span>
    </div>
    <div class="control-row log-control" data-param="waveSpeed">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>waveSpeed</label>
      <div class="log-buttons">
        <button class="log-btn magnitude" data-mult="0.1" title="÷10">÷10</button>
        <button class="log-btn" data-mult="0.5" title="÷2">÷2</button>
        <span class="log-value-display" id="waveSpeedValue">2.000</span>
        <button class="log-btn" data-mult="2" title="×2">×2</button>
        <button class="log-btn magnitude" data-mult="10" title="×10">×10</button>
      </div>
    </div>
    
    <h3>Motion</h3>
    <div class="control-row" data-param="rotationSpeed">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>rotationSpeed</label>
      <input type="range" min="0.02" max="0.5" step="0.01">
      <span class="value">0.10</span>
    </div>
    <div class="control-row" data-param="ringRotationBase">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>ringRotBase</label>
      <input type="range" min="0" max="0.12" step="0.005">
      <span class="value">0.05</span>
    </div>
    <div class="control-row" data-param="ringRotationDelta">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>ringRotΔ</label>
      <input type="range" min="-0.08" max="0.12" step="0.005">
      <span class="value">0.03</span>
    </div>
    
    <h3>Particles</h3>
    <div class="control-row" data-param="particleCount">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>particleCount</label>
      <input type="range" min="1500" max="3500" step="50">
      <span class="value">2500</span>
    </div>
    <div class="control-row" data-param="pointSize">
      <button class="lock-btn" title="Lock parameter">🔓</button>
      <label>pointSize</label>
      <input type="range" min="0.05" max="0.09" step="0.002">
      <span class="value">0.07</span>
    </div>
    
    <h3>Phase Control</h3>
    <div class="control-row" data-param="phaseDuration">
      <label>phaseCycles</label>
      <input type="range" min="5" max="60" step="1" id="phaseDurationSlider">
      <span class="value" id="phaseDurationValue">20</span>
    </div>
    <div class="control-row" data-param="sharedBlend">
      <label>sharedBlend</label>
      <input type="range" min="0" max="1" step="0.01" id="sharedBlendSlider">
      <span class="value" id="sharedBlendValue">0.00</span>
      <button class="lock-btn" id="blendLockBtn" data-testid="button-blend-lock">&#128275;</button>
    </div>
    <div class="control-row">
      <label>phase</label>
      <span class="value" id="phaseIndicator" style="flex: 1; text-align: center; color: #22d3ee;">UNIQUE</span>
    </div>
    <div class="control-row">
      <label>cycleProgress</label>
      <div style="flex: 1; height: 6px; background: rgba(255,255,255,0.1); border-radius: 3px; overflow: hidden;">
        <div id="cycleProgressBar" style="height: 100%; width: 0%; background: #22d3ee; transition: width 0.1s;"></div>
      </div>
      <span class="value" id="cycleProgressValue">0/20</span>
    </div>
  </div>
  

  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <script>
    // WAVE_SPEED is now a parameter (waveSpeed)
    // waveFrequency renamed to spatialWaveFreq (controls spatial density of waves)
    
    // ============================================
    // COHERENCE DETECTION SYSTEM
    // ============================================
    
    const PHI = (1 + Math.sqrt(5)) / 2;
    const PHI_2 = PHI * PHI;
    const PHI_3 = PHI * PHI * PHI;
    const PHI_4 = PHI * PHI * PHI * PHI;
    const PHI_5 = PHI * PHI * PHI * PHI * PHI;
    const PI = Math.PI;
    
    const TOLERANCE = 0.012;
    const TIGHT_TOLERANCE = 0.005;
    const PSEUDO_TOLERANCE = 0.003;
    
    // Pseudo-coherence ladders
    const LADDER_A = [144, 216, 324, 486];
    const LADDER_B = [176, 264, 396];
    const LADDER_PHI = [233, 350, 524];
    const LADDER_F13 = [155, 233, 350];
    const LADDER_F14 = [251, 377, 566];
    
    // Tour mode settings - matched to original Radial Petal Modulation feel
    const TOUR_CRUISE_SPEED = 0.004;      // Base cruising speed
    const TOUR_PEAK_SPEED = 0.000001;     // Nearly frozen at coherence peaks
    const TOUR_MAX_STEP = 0.015;          // Cap on acceleration
    const MAX_SPEED_INCREASE_RATE = 2.0;  // Can double speed per frame when accelerating
    let lastTourSpeed = TOUR_CRUISE_SPEED;
    
    // Petal range for tour
    const MIN_PETALS = 3.0;
    const MAX_PETALS = 15.0;
    
    function detectPseudoCoherence(x) {
      const numPetalsInt = Math.floor(x);
      const offset = x - numPetalsInt;
      
      if (offset < 0.005 || offset > 0.25) return null;
      
      const isSolidZone = numPetalsInt >= 3 && numPetalsInt <= 6;
      const isDisruptionZone = numPetalsInt >= 7 && numPetalsInt <= 8;
      
      if (!isSolidZone && !isDisruptionZone) return null;
      
      let ladders, minK;
      
      if (isSolidZone) {
        ladders = [...LADDER_A, ...LADDER_B, ...LADDER_PHI];
        minK = 36 * numPetalsInt;
      } else {
        ladders = [...LADDER_F13, ...LADDER_F14];
        minK = 30 * numPetalsInt;
      }
      
      ladders = ladders.filter(k => k >= minK);
      
      for (const k of ladders) {
        const expectedOffset = PHI * numPetalsInt / k;
        const distance = Math.abs(offset - expectedOffset);
        
        if (distance < PSEUDO_TOLERANCE) {
          let pseudoType = 'pseudo-spiral';
          let formula = `k=${k}`;
          
          if (LADDER_A.includes(k)) {
            pseudoType = k === 216 ? 'pseudo-half-disc' : 'pseudo-petals';
            formula = `F₁₂×${(k/144).toFixed(2)}`;
          } else if (LADDER_B.includes(k)) {
            pseudoType = 'pseudo-petals';
            formula = `F₁₂×${(k/144).toFixed(2)}`;
          } else if (LADDER_PHI.includes(k)) {
            pseudoType = (k === 233 || k === 350) ? 'pseudo-conch' : 'pseudo-spiral';
            formula = `F₁₃×${(k/233).toFixed(2)}`;
          } else if (LADDER_F13.includes(k)) {
            pseudoType = 'pseudo-spiral';
            formula = `F₁₃×${(k/233).toFixed(2)}`;
          } else if (LADDER_F14.includes(k)) {
            pseudoType = k === 251 ? 'pseudo-half-disc' : 'pseudo-petals';
            formula = `F₁₄×${(k/377).toFixed(2)}`;
          }
          
          return {
            type: 'pseudo',
            label: pseudoType.replace('pseudo-', 'Pseudo '),
            formula: `${numPetalsInt}+φ×${numPetalsInt}/${k}`
          };
        }
      }
      return null;
    }
    
    function detectCoherence(x) {
      let bestMatch = null;
      let bestDistance = Infinity;
      
      // Integer petals
      const nearestInt = Math.round(x);
      const intDistance = Math.abs(x - nearestInt);
      if (intDistance < TOLERANCE && nearestInt >= 3 && nearestInt <= 15) {
        if (intDistance < bestDistance) {
          bestDistance = intDistance;
          bestMatch = { type: 'petals', label: `${nearestInt} petals`, formula: `${nearestInt}` };
        }
      }
      
      // nφ multiples
      const nPhi = x / PHI;
      const nearestNPhi = Math.round(nPhi);
      const nPhiDistance = Math.abs(x - nearestNPhi * PHI);
      if (nPhiDistance < TOLERANCE && nearestNPhi >= 2 && nearestNPhi <= 9) {
        if (nPhiDistance < bestDistance) {
          bestDistance = nPhiDistance;
          bestMatch = { type: 'petals', label: `${nearestNPhi} petals`, formula: `${nearestNPhi}φ` };
        }
      }
      
      // n/φ divisions
      const nOverPhi = x * PHI;
      const nearestNOverPhi = Math.round(nOverPhi);
      const nOverPhiDistance = Math.abs(x - nearestNOverPhi / PHI);
      if (nOverPhiDistance < TOLERANCE && nearestNOverPhi >= 5 && nearestNOverPhi <= 24) {
        if (nOverPhiDistance < bestDistance) {
          bestDistance = nOverPhiDistance;
          bestMatch = { type: 'petals', label: `${nearestNOverPhi * 2} petals`, formula: `${nearestNOverPhi}/φ` };
        }
      }
      
      // nφ² all-to-center
      const nPhi2 = x / PHI_2;
      const nearestNPhi2 = Math.round(nPhi2);
      const nPhi2Distance = Math.abs(x - nearestNPhi2 * PHI_2);
      if (nPhi2Distance < TIGHT_TOLERANCE && nearestNPhi2 >= 1 && nearestNPhi2 <= 6) {
        if (nPhi2Distance < bestDistance) {
          bestDistance = nPhi2Distance;
          bestMatch = { type: 'all-to-center', label: 'All-to-center', formula: `${nearestNPhi2}φ²` };
        }
      }
      
      // φ powers - half-disc
      const phiPowers = [
        { value: PHI_3, label: 'φ³' },
        { value: PHI_4, label: 'φ⁴' },
        { value: PHI_5, label: 'φ⁵' }
      ];
      for (const pp of phiPowers) {
        const ppDistance = Math.abs(x - pp.value);
        if (ppDistance < TIGHT_TOLERANCE && ppDistance < bestDistance) {
          bestDistance = ppDistance;
          bestMatch = { type: 'half-disc', label: 'Half-disc', formula: pp.label };
        }
      }
      
      // (n/2)φ² + 0.5 half-disc variants
      const halfPhi2 = PHI_2 / 2;
      const nHalfPhi2PlusHalf = (x - 0.5) / halfPhi2;
      const nearestNHalfPhi2 = Math.round(nHalfPhi2PlusHalf);
      const nHalfPhi2Distance = Math.abs(x - (nearestNHalfPhi2 * halfPhi2 + 0.5));
      if (nHalfPhi2Distance < TIGHT_TOLERANCE && nearestNHalfPhi2 >= 2 && nearestNHalfPhi2 <= 11) {
        if (nHalfPhi2Distance < bestDistance) {
          bestDistance = nHalfPhi2Distance;
          const label = nearestNHalfPhi2 % 2 === 0 ? `${nearestNHalfPhi2 / 2}φ² + ½` : `${nearestNHalfPhi2}/2·φ² + ½`;
          bestMatch = { type: 'half-disc', label: 'Half-disc', formula: label };
        }
      }
      
      // (n + 0.5)φ² spirals
      const nPlusHalfPhi2 = x / PHI_2;
      const fractionalPart = nPlusHalfPhi2 - Math.floor(nPlusHalfPhi2);
      if (Math.abs(fractionalPart - 0.5) < 0.005) {
        const nearestHalfInt = Math.floor(nPlusHalfPhi2) + 0.5;
        const halfIntPhi2Distance = Math.abs(x - nearestHalfInt * PHI_2);
        if (halfIntPhi2Distance < TIGHT_TOLERANCE && nearestHalfInt >= 1.5 && nearestHalfInt <= 5.5) {
          if (halfIntPhi2Distance < bestDistance) {
            bestDistance = halfIntPhi2Distance;
            bestMatch = { type: 'spiral', label: 'Spirals', formula: `${nearestHalfInt - 0.5}½φ²` };
          }
        }
      }
      
      // Conch shells near φ³ or φ⁴
      const phi3Distance = Math.abs(x - PHI_3);
      const phi4Distance = Math.abs(x - PHI_4);
      if (phi3Distance < TOLERANCE && phi3Distance >= TIGHT_TOLERANCE && phi3Distance < bestDistance) {
        bestDistance = phi3Distance;
        bestMatch = { type: 'conch', label: `Conch (${x < PHI_3 ? 'point-cloud' : 'spiral'})`, formula: `φ³ ${x < PHI_3 ? '-' : '+'} ${phi3Distance.toFixed(4)}` };
      }
      if (phi4Distance < TOLERANCE && phi4Distance >= TIGHT_TOLERANCE && phi4Distance < bestDistance) {
        bestDistance = phi4Distance;
        bestMatch = { type: 'conch', label: `Conch (${x < PHI_4 ? 'point-cloud' : 'spiral'})`, formula: `φ⁴ ${x < PHI_4 ? '-' : '+'} ${phi4Distance.toFixed(4)}` };
      }
      
      // π-based coherences
      const piQuarter = PI / 4;
      const nearestPiN = Math.round(x / piQuarter);
      const piDistance = Math.abs(x - nearestPiN * piQuarter);
      if (piDistance < TOLERANCE && nearestPiN >= 4 && nearestPiN <= 19) {
        if (piDistance < bestDistance) {
          bestDistance = piDistance;
          let piLabel, spiralType;
          if (nearestPiN % 4 === 0) {
            piLabel = `${nearestPiN / 4}π`;
            spiralType = 'Dual-spokes';
          } else if (nearestPiN % 2 === 0) {
            piLabel = `${nearestPiN / 2}π/2`;
            spiralType = 'Dual-spokes';
          } else {
            piLabel = `${nearestPiN}π/4`;
            spiralType = 'Spiral + dark core';
          }
          bestMatch = { type: 'pi-coherent', label: spiralType, formula: piLabel };
        }
      }
      
      return bestMatch || { type: 'unclear', label: 'Unclear', formula: '' };
    }
    
    function getAllCoherenceCenters(pseudoMode) {
      const centers = [];
      const add = (value, radius = TOLERANCE) => {
        if (value >= MIN_PETALS && value <= MAX_PETALS) {
          centers.push({ value, radius });
        }
      };
      
      if (!pseudoMode) {
        // Integers
        for (let n = 3; n <= 15; n++) add(n, TOLERANCE);
        // nφ multiples
        for (let n = 2; n <= 9; n++) add(n * PHI, TOLERANCE);
        // n/φ divisions
        for (let n = 5; n <= 24; n++) add(n / PHI, TOLERANCE);
        // nφ² all-to-center
        for (let n = 1; n <= 6; n++) add(n * PHI_2, TIGHT_TOLERANCE);
        // φ powers
        add(PHI_3, TIGHT_TOLERANCE);
        add(PHI_4, TIGHT_TOLERANCE);
        add(PHI_5, TIGHT_TOLERANCE);
        // (n/2)φ² + 0.5 half-disc
        const halfPhi2 = PHI_2 / 2;
        for (let n = 2; n <= 11; n++) add(n * halfPhi2 + 0.5, TIGHT_TOLERANCE);
        // (n + 0.5)φ² spirals
        for (let n = 1; n <= 5; n++) add((n + 0.5) * PHI_2, TIGHT_TOLERANCE);
        // π-based
        const piQuarter = PI / 4;
        for (let n = 4; n <= 19; n++) add(n * piQuarter, TOLERANCE);
      } else {
        // Pseudo-coherences only
        for (let base = 3; base <= 8; base++) {
          const isSolid = base <= 6;
          const ladders = isSolid ? [...LADDER_A, ...LADDER_B, ...LADDER_PHI] : [...LADDER_F13, ...LADDER_F14];
          const minK = isSolid ? 36 * base : 30 * base;
          for (const k of ladders) {
            if (k >= minK) {
              const offset = PHI * base / k;
              add(base + offset, PSEUDO_TOLERANCE);
            }
          }
        }
      }
      return centers;
    }
    
    function coherenceStrength(x, pseudoMode) {
      const centers = getAllCoherenceCenters(pseudoMode);
      let minNormalizedDist = Infinity;
      for (const c of centers) {
        const dist = Math.abs(x - c.value);
        const normalized = dist / c.radius;
        minNormalizedDist = Math.min(minNormalizedDist, normalized);
      }
      return Math.exp(-minNormalizedDist);
    }
    
    function getTourSpeed(x, pseudoMode) {
      const strength = coherenceStrength(x, pseudoMode);
      const logPeak = Math.log(TOUR_PEAK_SPEED);

        let m = (layer.momentum[param] || 0) * 0.7;
        let impulse = (Math.random() - 0.5) * 0.3;
        
        let targetVal = undefined;
        // Color params are excluded from shared phase influence
        const colorParams = ['centerR', 'centerG', 'centerB', 'innerR', 'innerG', 'innerB', 'outerR', 'outerG', 'outerB'];
        if (sharedTarget && !colorParams.includes(param)) {

        layer.next[param] = nextVal; layer.momentum[param] = m;

    // Generate Fibonacci sphere points for even distribution
    function fibonacciSphere(numPoints, radius) {
      const points = [];
      const goldenRatio = (1 + Math.sqrt(5)) / 2;
      
      for (let i = 0; i < numPoints; i++) {
        // Fibonacci sphere algorithm
        const theta = 2 * Math.PI * i / goldenRatio;
        const phi = Math.acos(1 - 2 * (i + 0.5) / numPoints);
        
        const x = radius * Math.sin(phi) * Math.cos(theta);
        const y = radius * Math.cos(phi);
        const z = radius * Math.sin(phi) * Math.sin(theta);
        
        // Calculate normal (points outward from sphere center)
        const normal = new THREE.Vector3(x, y, z).normalize();
        
        points.push({
          position: [x, y, z],
          normal: normal,
          phi: phi,
          theta: theta
        });
      }
      return points;
    }
    
    const spherePoints = fibonacciSphere(NUM_FLOWERS, SPHERE_RADIUS);
    
    // Create flower data with sphere positions and orientations
    const flowerData = spherePoints.map((point, index) => ({
      pos: point.position,
      normal: point.normal,
      phi: point.phi,
      theta: point.theta,
      ringIndex: Math.floor(index / 7) // Group into 3 "rings" for rotation variation
    }));

    let flowers = [];
    const MAX_PARTICLES = 3500;
    const ringRotations = [0, 0, 0];

    function computeParticle(i, count, params, time) {
      const safeSize = Math.max(0.1, params.flowerSize), safeCount = Math.max(1, count);
      const safePetals = Math.max(3, params.numPetals);
      
      const fraction = i / safeCount;
      const goldenAngle = Math.PI * (3 - Math.sqrt(5));
      const theta = i * goldenAngle;
      
      // Single layer - simplified
      const petalAngle = theta * safePetals;
      const petalShape = Math.pow(Math.sin(petalAngle * 0.5), 8) * 0.8 + 0.2;
      const r = Math.sqrt(fraction) * safeSize, modulatedR = r * petalShape;
      const baseX = modulatedR * Math.cos(theta), baseY = modulatedR * Math.sin(theta);
      const dist = Math.sqrt(baseX * baseX + baseY * baseY);
      
      // Wave computation
      const spatialWaveFreq = params.temporalOffset || 1.0;
      
      // DYNAMIC MODIFICATION: Inverse relationship between strength and speed
      let waveSpeed = params.waveSpeed || 0.5;
      if (params.waveStrength > 2.0) {
        waveSpeed = waveSpeed / (1 + (params.waveStrength - 2.0) * 0.15);
      }
      
      const wavePhase = dist * spatialWaveFreq - time * waveSpeed;
      const waveZ = Math.sin(wavePhase) * params.waveStrength;
      const baseZ = Math.pow(r / safeSize, 2) * params.petalCurve * safeSize;
      const finalZ = baseZ + waveZ;
      
      // Color
      const centerColor = [params.centerR, params.centerG, params.centerB];
      const innerColor = [params.innerR, params.innerG, params.innerB];
      const outerColor = [params.outerR, params.outerG, params.outerB];
      const radiusRatio = Math.sqrt(fraction);
      const t = Math.min(radiusRatio * 1.5, 1.0);
      let finalR = centerColor[0] + (innerColor[0] - centerColor[0]) * t + (outerColor[0] - innerColor[0]) * t * t;
      let finalG = centerColor[1] + (innerColor[1] - centerColor[1]) * t + (outerColor[1] - innerColor[1]) * t * t;
      let finalB = centerColor[2] + (innerColor[2] - centerColor[2]) * t + (outerColor[2] - innerColor[2]) * t * t;
      if (i < safeCount * 0.08) { const boost = params.goldenCenterBoost; finalR += (1.0 - finalR) * boost * 0.5; finalG += (0.85 - finalG) * boost * 0.5; finalB *= (1.0 - boost * 0.3); }
      return { x: baseX, y: baseY, z: finalZ, r: finalR, g: finalG, b: finalB };
    }

    function createFlowerGeometry(flowerIndex, params, targetCount, time) {
      const positions = new Float32Array(targetCount * 3), colors = new Float32Array(targetCount * 3);
      const visibleCount = Math.min(targetCount, Math.round(params.particleCount));
      for (let i = 0; i < targetCount; i++) {
        const i3 = i * 3;
        if (i >= visibleCount) { positions[i3] = 0; positions[i3+1] = 0; positions[i3+2] = -1000; colors[i3] = 0; colors[i3+1] = 0; colors[i3+2] = 0; continue; }
        const p = computeParticle(i, visibleCount, params, time);
        positions[i3] = p.x; positions[i3+1] = p.y; positions[i3+2] = p.z;
        colors[i3] = p.r; colors[i3+1] = p.g; colors[i3+2] = p.b;
        if (isNaN(positions[i3])) positions[i3] = 0; if (isNaN(positions[i3+1])) positions[i3+1] = 0; if (isNaN(positions[i3+2])) positions[i3+2] = 0;
        if (isNaN(colors[i3])) colors[i3] = 0; if (isNaN(colors[i3+1])) colors[i3+1] = 0; if (isNaN(colors[i3+2])) colors[i3+2] = 0;
      }
      return { positions, colors, count: targetCount };
    }

    function rebuildFlowers(params) {
      flowers.forEach(f => { scene.remove(f.points); f.points.geometry.dispose(); f.points.material.dispose(); });
      flowers = [];
      flowerData.forEach((data, i) => {
        const { positions, colors } = createFlowerGeometry(i, params, MAX_PARTICLES, 0);
        const geometry = new THREE.BufferGeometry();
        geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
        geometry.setAttribute('color', new THREE.BufferAttribute(colors, 3));
        const material = new THREE.PointsMaterial({ size: params.pointSize, vertexColors: true, blending: THREE.AdditiveBlending, transparent: true, depthWrite: false, sizeAttenuation: true });
        const points = new THREE.Points(geometry, material);
        
        // Orient flower to face outward from sphere surface
        // The flower's local Z axis should align with the sphere normal
        const normal = data.normal;
        
        // Create rotation to align flower's Z-up with sphere normal
        const up = new THREE.Vector3(0, 0, 1); // Flower's original "up" direction
        const quaternion = new THREE.Quaternion();
        quaternion.setFromUnitVectors(up, normal);
        points.quaternion.copy(quaternion);
        
        // Position on sphere surface
        points.position.set(data.pos[0], data.pos[1], data.pos[2]);
        
        flowers.push({ points, ringIndex: data.ringIndex, baseQuaternion: quaternion.clone() });
        scene.add(points);
      });
    }

    function updateFlowers(sharedParams, flowerParamsArray, time, dt) {
      ringRotations[0] += dt * sharedParams.ringRotationBase;
      ringRotations[1] += dt * (sharedParams.ringRotationBase + sharedParams.ringRotationDelta);
      ringRotations[2] += dt * (sharedParams.ringRotationBase + sharedParams.ringRotationDelta * 2);
      
      flowers.forEach((flower, flowerIdx) => {
        const data = flowerData[flowerIdx];
        
        // Get this flower's params (either unique or blended with shared)
        const params = flowerParamsArray[flowerIdx];
        
        // Apply spin rotation around the flower's local normal (outward from sphere)
        const effectiveRotationOffset = flowerRotationOffset + (isInteracting ? dragDeltaY * 3 : 0);
        const spinAngle = time * params.rotationSpeed + ringRotations[data.ringIndex] + effectiveRotationOffset;
        const spinQuat = new THREE.Quaternion();
        spinQuat.setFromAxisAngle(new THREE.Vector3(0, 0, 1), spinAngle);
        
        // Combine base orientation with spin
        flower.points.quaternion.copy(flower.baseQuaternion);
        flower.points.quaternion.multiply(spinQuat);
        
        flower.points.material.size = params.pointSize;
        const { positions, colors } = createFlowerGeometry(flowerIdx, params, MAX_PARTICLES, time);
        const posArray = flower.points.geometry.attributes.position.array;
        const colorArray = flower.points.geometry.attributes.color.array;
        for (let i = 0; i < MAX_PARTICLES * 3; i++) { posArray[i] = positions[i]; colorArray[i] = colors[i]; }
        flower.points.geometry.attributes.position.needsUpdate = true;
        flower.points.geometry.attributes.color.needsUpdate = true;
      });
    }

    const initialParams = updateLayers(0, 1);
    rebuildFlowers(initialParams);

    window.addEventListener('resize', () => { camera.aspect = window.innerWidth / window.innerHeight; camera.updateProjectionMatrix(); renderer.setSize(window.innerWidth, window.innerHeight); });

    let evolutionMultiplier = 1.0;
    const ACCEL_RATE = 0.5, DECEL_RATE = 1.5;
    let isInteracting = false;
    
    // Touch/mouse drag offsets
    let interactionStartX = 0, interactionStartY = 0;
    let cameraOrbitOffset = 0;      // Accumulated X offset for camera orbit
    let flowerRotationOffset = 0;   // Accumulated Y offset for flower rotation
    let dragDeltaX = 0, dragDeltaY = 0;  // Current drag delta from start
    
    function startInteraction(x, y) {
      isInteracting = true;
      interactionStartX = x;
      interactionStartY = y;
      dragDeltaX = 0;
      dragDeltaY = 0;
    }
    
    function updateInteraction(x, y) {
      if (!isInteracting) return;
      dragDeltaX = (x - interactionStartX) / window.innerWidth;  // Normalized
      dragDeltaY = (y - interactionStartY) / window.innerHeight;
    }
    
    function endInteraction() {
      if (isInteracting) {
        // Commit the drag deltas to permanent offsets
        cameraOrbitOffset += dragDeltaX * 2;  // Scale for camera orbit
        flowerRotationOffset += dragDeltaY * 3;  // Scale for flower rotation
      }
      isInteracting = false;
      dragDeltaX = 0;
      dragDeltaY = 0;
    }
    
    canvas.addEventListener('mousedown', e => { e.preventDefault(); startInteraction(e.clientX, e.clientY); });
    canvas.addEventListener('mousemove', e => { updateInteraction(e.clientX, e.clientY); });
    canvas.addEventListener('mouseup', () => endInteraction());
    canvas.addEventListener('mouseleave', () => endInteraction());
    canvas.addEventListener('touchstart', e => { e.preventDefault(); startInteraction(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchmove', e => { if (e.touches.length > 0) updateInteraction(e.touches[0].clientX, e.touches[0].clientY); }, { passive: false });
    canvas.addEventListener('touchend', () => endInteraction());
    canvas.addEventListener('touchcancel', () => endInteraction());

    // ============================================
    // ANIMATION LOOP
    // ============================================

    let lastTime = null;
    let simTime = 0;
    let lastPanelUpdate = 0;

    function animate(timestamp) {
      const realTime = timestamp / 1000;
      
      if (lastTime === null) { lastTime = realTime; requestAnimationFrame(animate); return; }
      
      const realDt = Math.min(realTime - lastTime, 0.1);
      lastTime = realTime;

      // Manual evolution speed (click/touch to accelerate)
      if (isInteracting) {
        evolutionMultiplier += ACCEL_RATE * realDt * evolutionMultiplier;
        evolutionMultiplier = Math.min(evolutionMultiplier, 8.0);
        // Boost wave speed multiplier
        waveSpeedMultiplier = Math.min(waveSpeedMultiplier + 0.5 * realDt, WAVE_SPEED_BOOSTED_MAX);
      } else {
        if (evolutionMultiplier > 1.0) {
          evolutionMultiplier = Math.max(1.0, evolutionMultiplier - DECEL_RATE * realDt * evolutionMultiplier);
        }
        // Slowly normalize wave speed multiplier
        if (waveSpeedMultiplier > 1.0) {
          waveSpeedMultiplier = Math.max(1.0, waveSpeedMultiplier - 0.3 * realDt);
        }
      }

      // Get current params from evolution system
      const params = updateLayers(realDt, evolutionMultiplier);
      
      // Apply wave speed boost multiplier
      if (params.waveSpeed !== undefined) {
        params.waveSpeed *= waveSpeedMultiplier;
      }
      
      // Apply manual overrides from control panel
      applyManualOverrides(params);
      
      // TOUR MODE: Override numPetals with coherence-aware sweep (unless manually locked)
      if (isTourMode && !lockedParams.has('numPetals')) {
        const tourStep = getTourSpeed(tourPetals, pseudoMode);
        tourPetals += tourStep * tourDirection;
        
        // Reverse direction at bounds
        if (tourPetals >= MAX_PETALS) {
          tourPetals = MAX_PETALS;
          tourDirection = -1;
          lastTourSpeed = TOUR_CRUISE_SPEED;
        } else if (tourPetals <= MIN_PETALS) {
          tourPetals = MIN_PETALS;
          tourDirection = 1;
          lastTourSpeed = TOUR_CRUISE_SPEED;
        }
        
        // Override the evolved numPetals
        params.numPetals = tourPetals;
      }
      
      // Update control panel sliders periodically (not every frame for performance)
      if (realTime - lastPanelUpdate > 0.1) {
        updateControlPanel(params);
        lastPanelUpdate = realTime;
      }
      
      // Update phase system
      updatePhaseSystem();
      
      // Update auto-blend momentum
      updateAutoBlend(realDt, isInteracting);
      
      // Get effective blend value (phase-aware)
      const effectiveBlend = getEffectiveBlend();
      
      // Compute per-flower params with blending
      const flowerParamsArray = [];
      for (let f = 0; f < NUM_FLOWERS; f++) {
        // Get unique params for this flower
        const uniqueParams = updateFlowerLayers(f, realDt, evolutionMultiplier);
        
        // Apply tour mode numPetals to unique params too if not locked
        if (isTourMode && !lockedParams.has('numPetals')) {
          uniqueParams.numPetals = tourPetals;
        }
        
        // Blend between unique and shared params
        const blendedParams = blendParams(uniqueParams, params, effectiveBlend);
        flowerParamsArray.push(blendedParams);
      }
      
      // Update simulation time
      simTime += realDt;

      // Camera movement - orbit around sphere (with drag offset)
      cameraAngle += realDt * 0.05;
      const effectiveCameraAngle = cameraAngle + cameraOrbitOffset + (isInteracting ? dragDeltaX * 2 : 0);
      camera.position.x = Math.sin(effectiveCameraAngle) * cameraRadius;
      camera.position.z = Math.cos(effectiveCameraAngle) * cameraRadius;
      camera.position.y = Math.sin(realTime * 0.08) * 15; // Orbit up and down around sphere
      camera.lookAt(0, 0, 0);

      // Update flowers with per-flower params
      updateFlowers(params, flowerParamsArray, simTime, realDt);

      // Background
      const bgIntensity = 0.02 * (1 - params.vignetteStrength * 0.5);
      renderer.setClearColor(new THREE.Color(bgIntensity, bgIntensity, bgIntensity * 1.2));
      renderer.render(scene, camera);

      requestAnimationFrame(animate);
    }

    requestAnimationFrame(animate);
  </script>
</body>
